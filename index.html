<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel The Point - Gestão Profissional</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --cor-p: #add8e6; --cor-d: #fff700; --cor-vinho: #800020; --cor-borda: #ddd; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: #f4f7f6; overflow: hidden; }
        
        .sidebar { width: 280px; background: white; padding: 12px; border-right: 1px solid #ddd; overflow-y: auto; box-shadow: 2px 0 10px rgba(0,0,0,0.05); flex-shrink: 0; }
        .sidebar h2 { font-size: 0.9rem; margin-top: 0; color: #2c3e50; border-bottom: 2px solid #38a169; padding-bottom: 5px; }
        .campo { margin-bottom: 8px; }
        label { display: block; font-size: 10px; font-weight: bold; margin-bottom: 2px; color: #666; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 5px; border: 1px solid #cbd5e0; border-radius: 4px; box-sizing: border-box; font-size: 12px; }
        
        .btn-salvar { width: 100%; padding: 10px; background: #38a169; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 5px; font-size: 13px; }
        .btn-excluir { width: 100%; padding: 8px; background: #e53e3e; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 8px; font-size: 11px; display: none; }
        .btn-limpar { width: 100%; padding: 5px; background: #718096; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 5px; font-size: 10px; display: none; }

        .main-content { flex: 1; padding: 5px 10px; overflow-y: auto; display: flex; flex-direction: column; background: #edf2f7; }
        .topo-controles { display: flex; justify-content: center; align-items: center; margin-bottom: 5px; gap: 8px; position: sticky; top: 0; z-index: 100; background: #edf2f7; padding: 3px; }
        .btn-nav { padding: 5px 10px; cursor: pointer; background: white; border: 1px solid #cbd5e0; border-radius: 4px; font-weight: bold; font-size: 11px; }
        .btn-hoje { background: #3182ce; color: white; border: none; }

        .mes-container { margin-bottom: 15px; background: white; border-radius: 6px; padding: 5px; box-shadow: 0 1px 5px rgba(0,0,0,0.05); width: 100%; box-sizing: border-box; }
        .titulo-mes-tabela { font-weight: bold; color: #2d3748; margin-bottom: 3px; font-size: 12px; text-transform: uppercase; padding-left: 5px; }
        
        table { border-collapse: collapse; width: 100%; table-layout: fixed; }
        th, td { border: 1px solid var(--cor-borda); height: 26px; text-align: center; font-size: 9px; overflow: hidden; white-space: nowrap; text-overflow: clip; padding: 0; }
        
        .col-apto { width: 130px; text-align: left; padding-left: 8px; background: #f8f9fa; font-weight: bold; font-size: 9px; }
        .cabecalho-dias { background: #2d3748; color: white; height: 18px; }
        .cabecalho-semana { background: #f1f5f9; color: #4a5568; height: 16px; font-size: 8px; font-weight: bold; }
        
        .reserva-p, .reserva-d { font-size: 11px; font-weight: bold; color: #000; cursor: pointer; }
        .reserva-p:hover, .reserva-d:hover { filter: brightness(0.9); }
        .reserva-p { background-color: var(--cor-p); }
        .reserva-d { background-color: var(--cor-d); }
        .reserva-vinho { background-color: var(--cor-vinho); border: none; color: transparent; cursor: pointer; } 
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 3000; justify-content: center; align-items: center; }
        .modal-box { background: white; padding: 20px; border-radius: 10px; text-align: center; max-width: 350px; width: 90%; }
        .btn-modal { padding: 8px 18px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin: 5px; font-size: 13px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 id="form-titulo">Nova Reserva</h2>
    <input type="hidden" id="edit_id"> <!-- Campo invisível para guardar o ID sendo editado -->

    <div class="campo"><label>Apartamento *</label><select id="apto_id" onchange="verificarReserva()"></select></div>
    <div class="campo"><label>Hóspede Principal *</label><input type="text" id="guest_principal"></div>
    <div style="display: flex; gap: 5px;">
        <div class="campo" style="flex: 1;"><label>Check-In *</label><input type="date" id="data_checkin" onchange="verificarReserva()"></div>
        <div class="campo" style="flex: 1;"><label>Check-Out *</label><input type="date" id="data_checkout" onchange="verificarReserva()"></div>
    </div>
    <div class="campo"><label>Noites</label><input type="text" id="noites" readonly style="background: #f0f0f0; font-weight: bold;"></div>
    <div class="campo">
        <label>Origem *</label>
        <select id="origem">
            <option value="Booking">Booking</option><option value="AirBnb">AirBnb</option>
            <option value="VRBO">VRBO</option><option value="D">Direto (D)</option><option value="P">Pendente (P)</option>
        </select>
    </div>
    <div class="campo"><label>Adultos</label><input type="number" id="num_adultos" value="3"></div>
    <div class="campo"><label>Valor Creditado (R$)</label><input type="number" step="0.01" id="valor_creditado"></div>
    <div class="campo"><label>Valor Comissão (R$)</label><input type="number" step="0.01" id="valor_comissao"></div>
    <div class="campo"><label>OBS:</label><textarea id="observacoes" rows="2"></textarea></div>
    
    <button id="btn-salvar" class="btn-salvar" onclick="salvarFinal()">Salvar Reserva</button>
    <button id="btn-limpar" class="btn-limpar" onclick="resetarFormulario()">Novo (Limpar)</button>
    <button id="btn-excluir" class="btn-excluir" onclick="confirmarExclusao()">Excluir / Cancelar Reserva</button>
</div>

<div class="main-content">
    <div class="topo-controles">
        <button class="btn-nav" onclick="mudarMes(-1)">◀ ANTERIOR</button>
        <button class="btn-nav btn-hoje" onclick="irParaHoje()">HOJE</button>
        <button class="btn-nav" onclick="mudarMes(1)">PRÓXIMO ▶</button>
    </div>
    <div id="area-mapas"></div>
</div>

<!-- Modais -->
<div id="modalErro" class="modal-overlay"><div class="modal-box"><h3 style="color:#e53e3e">Bloqueado</h3><p id="msgErro"></p><button class="btn-modal" style="background:#e53e3e;color:white" onclick="fecharModais()">OK</button></div></div>
<div id="modalAlerta" class="modal-overlay"><div class="modal-box"><h3 style="color:#d69e2e">Atenção</h3><p id="msgAlerta"></p><button class="btn-modal" style="background:#38a169;color:white" onclick="confirmarAlerta()">Continuar</button><button class="btn-modal" style="background:#718096;color:white" onclick="limparDatas()">Corrigir</button></div></div>
<div id="modalSucesso" class="modal-overlay"><div class="modal-box"><h3>✔ Sucesso!</h3><p id="msgSucessoTxt"></p><button class="btn-modal" style="background:#38a169;color:white" onclick="location.reload()">OK</button></div></div>
<div id="modalConfirmarExcluir" class="modal-overlay"><div class="modal-box"><h3>Excluir Reserva?</h3><p>Esta ação não pode ser desfeita.</p><button class="btn-modal" style="background:#e53e3e;color:white" onclick="excluirDeVez()">Sim, Excluir</button><button class="btn-modal" style="background:#718096;color:white" onclick="fecharModais()">Cancelar</button></div></div>

<script>
    const SB_URL = "https://eqoayyftpddombylgxpw.supabase.co";
    const SB_KEY = "sb_publishable_52ePL6AdYLm58359gM4VJg_x5bfdamZ";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    let mesBase = new Date(); mesBase.setDate(1);
    let aptosGlobais = [];
    let reservasGlobais = [];
    let minNoites = 4;
    let alertaAceito = false;
    const diasSemanaNomes = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];

    function fmt(d) { if(!d) return ""; return d.toString().split('T')[0].split(' ')[0].trim(); }

    async function init() {
        const { data: aptos } = await supabaseClient.from('apartamentos').select('id, nome_apto').order('nome_apto');
        aptosGlobais = aptos;
        const select = document.getElementById('apto_id');
        select.innerHTML = '<option value="">Selecione...</option>';
        aptos.forEach(a => select.innerHTML += `<option value="${a.id}">${a.nome_apto}</option>`);
        const { data: config } = await supabaseClient.from('configuracoes').select('valor').eq('chave', 'minimo_noites_alerta').single();
        if (config) minNoites = config.valor;
        renderizarMapaTriplo();
    }

    function getCodigoOrigem(origem) {
        const mapa = {'Booking': 'B', 'AirBnb': 'A', 'VRBO': 'V', 'D': 'D', 'P': 'P'};
        return mapa[origem] || origem;
    }

    async function renderizarMapaTriplo() {
        const area = document.getElementById('area-mapas');
        const { data: reservas } = await supabaseClient.from('reservas').select('*');
        reservasGlobais = reservas || [];
        area.innerHTML = "";
        for (let i = 0; i < 3; i++) {
            const dataFoco = new Date(mesBase.getFullYear(), mesBase.getMonth() + i, 1);
            area.appendChild(criarTabelaMes(dataFoco, reservasGlobais));
        }
    }

    function criarTabelaMes(dataRef, reservas) {
        const ano = dataRef.getFullYear(); const mes = dataRef.getMonth();
        const ultimoDia = new Date(ano, mes + 1, 0).getDate();
        const container = document.createElement('div'); container.className = 'mes-container';
        const titulo = document.createElement('div'); titulo.className = 'titulo-mes-tabela';
        titulo.innerText = dataRef.toLocaleString('pt-BR', { month: 'long', year: 'numeric' });
        container.appendChild(titulo);

        let html = `<table><thead><tr class="cabecalho-dias"><th class="col-apto">Dia</th>`;
        for (let d = 1; d <= ultimoDia; d++) html += `<th>${d}</th>`;
        html += `</tr><tr class="cabecalho-semana"><th class="col-apto">Apartamento</th>`;
        for (let d = 1; d <= ultimoDia; d++) html += `<th>${diasSemanaNomes[new Date(ano, mes, d).getDay()]}</th>`;
        html += `</tr></thead><tbody>`;

        aptosGlobais.forEach(apto => {
            html += `<tr><td class="col-apto">${apto.nome_apto}</td>`;
            for (let d = 1; d <= ultimoDia; d++) {
                const dIso = new Date(ano, mes, d).toISOString().split('T')[0];
                const saindoH = reservas.find(r => r.apto_id === apto.id && fmt(r.data_checkout) === dIso);
                const entrandoH = reservas.find(r => r.apto_id === apto.id && fmt(r.data_checkin) === dIso);

                if (saindoH && entrandoH) {
                    html += `<td class="reserva-vinho" onclick="prepararEdicao('${entrandoH.id}')"></td>`;
                } else {
                    const resA = reservas.find(r => r.apto_id === apto.id && dIso >= fmt(r.data_checkin) && dIso <= fmt(r.data_checkout));
                    
                    if (resA && (dIso === fmt(resA.data_checkin) || d === 1 || (saindoH === undefined && dIso > fmt(resA.data_checkin)))) {
                        let deveD = false;
                        const ontemIso = new Date(ano, mes, d - 1).toISOString().split('T')[0];
                        const foiT = reservas.find(r => r.apto_id === apto.id && fmt(r.data_checkout) === ontemIso && reservas.some(r2 => r2.apto_id === apto.id && fmt(r2.data_checkin) === ontemIso));

                        if (dIso === fmt(resA.data_checkin) && !saindoH) deveD = true;
                        else if (foiT && dIso > ontemIso) deveD = true;
                        else if (d === 1) deveD = true;

                        if (deveD) {
                            let dur = 0; let tempD = d;
                            while(tempD <= ultimoDia) {
                                const dL = new Date(ano, mes, tempD).toISOString().split('T')[0];
                                if (dL > fmt(resA.data_checkout)) break;
                                if (reservas.some(r => r.apto_id === apto.id && fmt(r.data_checkout) === dL && reservas.some(r2 => r2.apto_id === apto.id && fmt(r2.data_checkin) === dL)) && tempD > d) break;
                                dur++; tempD++;
                            }
                            const label = `${getCodigoOrigem(resA.origem)} - ${resA.guest_principal} - ${resA.num_adultos}Adt`;
                            html += `<td colspan="${dur}" class="${(resA.origem === 'P') ? 'reserva-p' : 'reserva-d'}" onclick="prepararEdicao('${resA.id}')">${label}</td>`;
                            d += (dur - 1);
                        } else html += `<td></td>`;
                    } else html += `<td></td>`;
                }
            }
            html += `</tr>`;
        });
        html += `</tbody></table>`; container.innerHTML += html; return container;
    }

    // FUNÇÕES DE EDIÇÃO
    function prepararEdicao(id) {
        const res = reservasGlobais.find(r => r.id === id);
        if (!res) return;

        document.getElementById('edit_id').value = res.id;
        document.getElementById('form-titulo').innerText = "Editar Reserva";
        document.getElementById('apto_id').value = res.apto_id;
        document.getElementById('guest_principal').value = res.guest_principal;
        document.getElementById('data_checkin').value = fmt(res.data_checkin);
        document.getElementById('data_checkout').value = fmt(res.data_checkout);
        document.getElementById('noites').value = res.noites;
        document.getElementById('origem').value = res.origem;
        document.getElementById('num_adultos').value = res.num_adultos || 3;
        document.getElementById('valor_creditado').value = res.valor_creditado || 0;
        document.getElementById('valor_comissao').value = res.valor_comissao || 0;
        document.getElementById('observacoes').value = res.observacoes || "";

        document.getElementById('btn-salvar').innerText = "Atualizar Reserva";
        document.getElementById('btn-excluir').style.display = "block";
        document.getElementById('btn-limpar').style.display = "block";
        
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function resetarFormulario() {
        document.getElementById('edit_id').value = "";
        document.getElementById('form-titulo').innerText = "Nova Reserva";
        document.getElementById('btn-salvar').innerText = "Salvar Reserva";
        document.getElementById('btn-excluir').style.display = "none";
        document.getElementById('btn-limpar').style.display = "none";
        document.getElementById('data_checkin').value = "";
        document.getElementById('data_checkout').value = "";
        document.getElementById('guest_principal').value = "";
        document.getElementById('num_adultos').value = "3";
        document.getElementById('valor_creditado').value = "";
        document.getElementById('valor_comissao').value = "";
        document.getElementById('observacoes').value = "";
        document.getElementById('noites').value = "";
    }

    function confirmarExclusao() { document.getElementById('modalConfirmarExcluir').style.display = 'flex'; }
    async function excluirDeVez() {
        const id = document.getElementById('edit_id').value;
        const { error } = await supabaseClient.from('reservas').delete().eq('id', id);
        if (!error) location.reload();
    }

    // NAVEGAÇÃO
    function mudarMes(v) { mesBase.setMonth(mesBase.getMonth() + v); renderizarMapaTriplo(); }
    function irParaHoje() { mesBase = new Date(); mesBase.setDate(1); renderizarMapaTriplo(); }

    // VALIDAÇÃO
    async function verificarReserva() {
        const apto = document.getElementById('apto_id').value;
        const cin = fmt(document.getElementById('data_checkin').value); 
        const cout = fmt(document.getElementById('data_checkout').value);
        const editId = document.getElementById('edit_id').value;
        if (!apto || !cin) return;

        // Ao editar, ignoramos a própria reserva na busca de conflitos
        let lista = reservasGlobais.filter(r => r.apto_id === apto && r.id !== editId);

        const cIn = lista.find(r => cin >= fmt(r.data_checkin) && cin < fmt(r.data_checkout));
        if (cIn) {
            mostrarModal('modalErro', `O apto já estará ocupado por ${cIn.guest_principal}.`, 'msgErro');
            document.getElementById('data_checkin').value = ""; return;
        }

        if (!cout) return;
        const cGeral = lista.find(r => cin < fmt(r.data_checkout) && cout > fmt(r.data_checkin));
        if (cGeral) {
            mostrarModal('modalErro', `Bloqueado: Conflito com a reserva de ${cGeral.guest_principal}.`, 'msgErro');
            document.getElementById('data_checkout').value = ""; return;
        }

        const noites = Math.round((new Date(cout + "T12:00:00") - new Date(cin + "T12:00:00")) / (1000 * 60 * 60 * 24));
        document.getElementById('noites').value = noites > 0 ? noites : "Erro";
        if (noites < minNoites && !alertaAceito && noites > 0) mostrarModal('modalAlerta', `Estadia curta (${noites} noites).`, 'msgAlerta');
    }

    function mostrarModal(id, msg, idT) { if(idT) document.getElementById(idT).innerText = msg; document.getElementById(id).style.display = 'flex'; }
    function fecharModais() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); }
    function confirmarAlerta() { alertaAceito = true; fecharModais(); verificarReserva(); }
    function limparDatas() { document.getElementById('data_checkin').value = ""; document.getElementById('data_checkout').value = ""; fecharModais(); }

    async function salvarFinal() {
        const id = document.getElementById('edit_id').value;
        const r = {
            apto_id: document.getElementById('apto_id').value,
            guest_principal: document.getElementById('guest_principal').value,
            data_checkin: document.getElementById('data_checkin').value,
            data_checkout: document.getElementById('data_checkout').value,
            noites: document.getElementById('noites').value,
            origem: document.getElementById('origem').value,
            num_adultos: document.getElementById('num_adultos').value,
            valor_creditado: document.getElementById('valor_creditado').value || 0,
            valor_comissao: document.getElementById('valor_comissao').value || 0,
            observacoes: document.getElementById('observacoes').value
        };

        let result;
        if (id) {
            result = await supabaseClient.from('reservas').update(r).eq('id', id);
            document.getElementById('msgSucessoTxt').innerText = "Reserva atualizada com sucesso!";
        } else {
            result = await supabaseClient.from('reservas').insert([r]);
            document.getElementById('msgSucessoTxt').innerText = "Reserva cadastrada com sucesso!";
        }

        if (!result.error) document.getElementById('modalSucesso').style.display = 'flex';
        else alert("Erro: " + result.error.message);
    }
    init();
</script>
</body>
</html>
