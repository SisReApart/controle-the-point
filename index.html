<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel The Point - Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --cor-p: #add8e6; --cor-d: #fff700; --cor-vinho: #800020; --cor-borda: #ddd; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: #f4f7f6; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 320px; background: white; padding: 20px; border-right: 1px solid #ddd; overflow-y: auto; box-shadow: 2px 0 10px rgba(0,0,0,0.05); }
        .sidebar h2 { font-size: 1.1rem; margin-top: 0; color: #2c3e50; border-bottom: 2px solid #38a169; padding-bottom: 8px; }
        .campo { margin-bottom: 12px; }
        label { display: block; font-size: 11px; font-weight: bold; margin-bottom: 4px; color: #666; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 8px; border: 1px solid #cbd5e0; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        .btn-salvar { width: 100%; padding: 12px; background: #38a169; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 10px; font-size: 15px; }
        
        /* Main Content */
        .main-content { flex: 1; padding: 15px; overflow: auto; display: flex; flex-direction: column; }
        .topo-controles { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: white; padding: 10px 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .topo-controles h2 { margin: 0; color: #2c3e50; font-size: 1.4rem; }
        .btn-nav { padding: 8px 15px; cursor: pointer; background: #edf2f7; border: 1px solid #cbd5e0; border-radius: 4px; font-weight: bold; transition: 0.2s; }
        .btn-nav:hover { background: #cbd5e0; }
        .btn-hoje { background: #3182ce; color: white; border: none; margin: 0 10px; }
        .btn-hoje:hover { background: #2b6cb0; }

        /* Tabela do Mapa */
        .tabela-wrapper { background: white; border-radius: 8px; padding: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow-x: auto; }
        table { border-collapse: collapse; width: 100%; table-layout: fixed; }
        th, td { border: 1px solid var(--cor-borda); height: 35px; text-align: center; font-size: 11px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; position: relative; }
        
        .col-apto { width: 180px; text-align: left; padding-left: 12px; background: #f8f9fa; font-weight: bold; border-right: 2px solid #ddd; }
        .cabecalho-dias { background: #34495e; color: white; height: 30px; }
        
        /* Cores das Reservas */
        .reserva-p { background-color: var(--cor-p); color: #000; font-weight: 600; border: 1px solid #8ab8c9; }
        .reserva-d { background-color: var(--cor-d); color: #000; font-weight: 600; border: 1px solid #d4ce00; }
        .reserva-vinho { background-color: var(--cor-vinho); color: #fff; font-weight: bold; border: 1px solid #600018; }
        
        /* Modais */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 3000; justify-content: center; align-items: center; }
        .modal-box { background: white; padding: 25px; border-radius: 10px; text-align: center; max-width: 400px; width: 90%; }
        .btn-modal { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin: 5px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Nova Reserva</h2>
    <div class="campo">
        <label>Apartamento *</label>
        <select id="apto_id" onchange="verificarReserva()"></select>
    </div>
    <div class="campo">
        <label>Hóspede Principal *</label>
        <input type="text" id="guest_principal">
    </div>
    <div style="display: flex; gap: 10px;">
        <div class="campo" style="flex: 1;">
            <label>Check-In *</label>
            <input type="date" id="data_checkin" onchange="verificarReserva()">
        </div>
        <div class="campo" style="flex: 1;">
            <label>Check-Out *</label>
            <input type="date" id="data_checkout" onchange="verificarReserva()">
        </div>
    </div>
    <div class="campo">
        <label>Noites</label>
        <input type="text" id="noites" readonly style="background: #f0f0f0; font-weight: bold;">
    </div>
    <div class="campo">
        <label>Origem *</label>
        <select id="origem">
            <option value="Booking">Booking</option>
            <option value="AirBnb">AirBnb</option>
            <option value="VRBO">VRBO</option>
            <option value="D">Direto (D)</option>
            <option value="P">Pendente (P)</option>
        </select>
    </div>
    <div class="campo">
        <label>Valor Creditado (R$)</label>
        <input type="number" step="0.01" id="valor_creditado">
    </div>
    <div class="campo">
        <label>OBS:</label>
        <textarea id="observacoes" rows="2"></textarea>
    </div>
    <button class="btn-salvar" onclick="salvarFinal()">Salvar Reserva</button>
</div>

<div class="main-content">
    <div class="topo-controles">
        <h2 id="titulo-mes">MAIO DE 2026</h2>
        <div>
            <button class="btn-nav" onclick="mudarMes(-1)">◀ ANTERIOR</button>
            <button class="btn-nav btn-hoje" onclick="irParaHoje()">HOJE</button>
            <button class="btn-nav" onclick="mudarMes(1)">PRÓXIMO ▶</button>
        </div>
    </div>
    <div class="tabela-wrapper" id="grade-mapa">
        <!-- Tabela Gerada via JS -->
    </div>
</div>

<!-- Modais -->
<div id="modalErro" class="modal-overlay"><div class="modal-box"><h3 style="color:#e53e3e">Bloqueado</h3><p id="msgErro"></p><button class="btn-modal" style="background:#e53e3e;color:white" onclick="fecharModais()">OK</button></div></div>
<div id="modalAlerta" class="modal-overlay"><div class="modal-box"><h3 style="color:#d69e2e">Atenção</h3><p id="msgAlerta"></p><button class="btn-modal" style="background:#38a169;color:white" onclick="confirmarAlerta()">Continuar</button><button class="btn-modal" style="background:#718096;color:white" onclick="limparDatas()">Corrigir</button></div></div>
<div id="modalSucesso" class="modal-overlay"><div class="modal-box"><h3>✔ Sucesso!</h3><p>Reserva cadastrada.</p><button class="btn-modal" style="background:#38a169;color:white" onclick="location.reload()">OK</button></div></div>

<script>
    const SB_URL = "https://eqoayyftpddombylgxpw.supabase.co";
    const SB_KEY = "sb_publishable_52ePL6AdYLm58359gM4VJg_x5bfdamZ";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    let dataMapa = new Date(); 
    let aptosGlobais = [];
    let minNoites = 4;
    let alertaAceito = false;

    async function init() {
        const { data: aptos } = await supabaseClient.from('apartamentos').select('id, nome_apto').order('nome_apto');
        aptosGlobais = aptos;
        const select = document.getElementById('apto_id');
        select.innerHTML = '<option value="">Selecione...</option>';
        aptos.forEach(a => select.innerHTML += `<option value="${a.id}">${a.nome_apto}</option>`);

        const { data: config } = await supabaseClient.from('configuracoes').select('valor').eq('chave', 'minimo_noites_alerta').single();
        if (config) minNoites = config.valor;

        renderizarMapa();
    }

    async function renderizarMapa() {
        const ano = dataMapa.getFullYear();
        const mes = dataMapa.getMonth();
        document.getElementById('titulo-mes').innerText = dataMapa.toLocaleString('pt-BR', { month: 'long', year: 'numeric' }).toUpperCase();

        const ultimoDia = new Date(ano, mes + 1, 0).getDate();
        const { data: reservas } = await supabaseClient.from('reservas').select('*');

        let html = `<table><thead><tr class="cabecalho-dias"><th class="col-apto">Apartamento</th>`;
        for (let d = 1; d <= ultimoDia; d++) html += `<th style="width:30px">${d}</th>`;
        html += `</tr></thead><tbody>`;

        aptosGlobais.forEach(apto => {
            html += `<tr><td class="col-apto">${apto.nome_apto}</td>`;
            
            // Lógica de construção da linha com mesclagem e cores
            for (let d = 1; d <= ultimoDia; d++) {
                const dataIso = new Date(ano, mes, d).toISOString().split('T')[0];
                
                // 1. Verificar se é TURNOVER (Saída de um e Entrada de outro no mesmo dia)
                const saindo = reservas.find(r => r.apto_id === apto.id && r.data_checkout === dataIso);
                const entrando = reservas.find(r => r.apto_id === apto.id && r.data_checkin === dataIso);

                if (saindo && entrando) {
                    html += `<td class="reserva-vinho" title="Checkout: ${saindo.guest_principal} / Checkin: ${entrando.guest_principal}">T</td>`;
                } 
                else {
                    // 2. Verificar se é uma reserva normal e calcular duração para mesclagem
                    const r = reservas.find(r => r.apto_id === apto.id && dataIso >= r.data_checkin && dataIso < r.data_checkout);
                    
                    if (r && dataIso === r.data_checkin) {
                        // Calcular quantos dias dessa reserva cabem neste mês a partir de hoje
                        let duracaoExibida = 0;
                        for (let i = d; i <= ultimoDia; i++) {
                            const dComp = new Date(ano, mes, i).toISOString().split('T')[0];
                            if (dComp >= r.data_checkin && dComp < r.data_checkout) {
                                // Parar se o próximo dia for um Turnover
                                const proxDiaTurnover = reservas.find(res => res.apto_id === apto.id && res.data_checkin === dComp && reservas.some(res2 => res2.apto_id === apto.id && res2.data_checkout === dComp));
                                if (proxDiaTurnover && i > d) break;
                                duracaoExibida++;
                            } else break;
                        }
                        
                        const classe = (r.origem === 'P') ? 'reserva-p' : 'reserva-d';
                        html += `<td colspan="${duracaoExibida}" class="${classe}">${r.guest_principal}</td>`;
                        d += (duracaoExibida - 1); // Pular as células mescladas
                    } else {
                        html += `<td></td>`;
                    }
                }
            }
            html += `</tr>`;
        });
        html += `</tbody></table>`;
        document.getElementById('grade-mapa').innerHTML = html;
    }

    function mudarMes(v) { dataMapa.setMonth(dataMapa.getMonth() + v); renderizarMapa(); }
    function irParaHoje() { dataMapa = new Date(); renderizarMapa(); }

    // VALIDAÇÕES ATUALIZADAS PARA PERMITIR TURNOVER
    async function verificarReserva() {
        const apto = document.getElementById('apto_id').value;
        const checkin = document.getElementById('data_checkin').value;
        const checkout = document.getElementById('data_checkout').value;
        if (!apto || !checkin) return;

        // Regra do Turnover: Só bloqueia se o NOVO checkin for MENOR que o Checkout existente
        const { data: conflitoIn } = await supabaseClient.from('reservas').select('guest_principal')
            .eq('apto_id', apto).lt('data_checkin', checkout).gt('data_checkout', checkin);

        if (conflitoIn.length > 0) {
            mostrarModal('modalErro', `Conflito detectado com a reserva de ${conflitoIn[0].guest_principal}.`, 'msgErro');
            document.getElementById('data_checkin').value = "";
            return;
        }

        if (!checkout) return;
        const inD = new Date(checkin); const outD = new Date(checkout);
        const noites = Math.ceil(Math.abs(outD - inD) / (1000 * 60 * 60 * 24));
        document.getElementById('noites').value = outD > inD ? noites : "Erro";

        if (noites < minNoites && !alertaAceito) {
            mostrarModal('modalAlerta', `Estadia curta (${noites} noites).`, 'msgAlerta');
        }
    }

    function mostrarModal(id, msg, idT) { document.getElementById(idT).innerText = msg; document.getElementById(id).style.display = 'flex'; }
    function fecharModais() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); }
    function confirmarAlerta() { alertaAceito = true; fecharModais(); verificarReserva(); }
    function limparDatas() { document.getElementById('data_checkin').value = ""; document.getElementById('data_checkout').value = ""; fecharModais(); }

    async function salvarFinal() {
        const r = {
            apto_id: document.getElementById('apto_id').value,
            guest_principal: document.getElementById('guest_principal').value,
            data_checkin: document.getElementById('data_checkin').value,
            data_checkout: document.getElementById('data_checkout').value,
            noites: document.getElementById('noites').value,
            origem: document.getElementById('origem').value,
            valor_creditado: document.getElementById('valor_creditado').value || 0,
            observacoes: document.getElementById('observacoes').value
        };
        const { error } = await supabaseClient.from('reservas').insert([r]);
        if (!error) document.getElementById('modalSucesso').style.display = 'flex';
        else alert("Erro ao salvar: " + error.message);
    }

    init();
</script>
</body>
</html>
