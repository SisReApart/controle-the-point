<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel The Point - Gestão Completa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --cor-p: #add8e6; --cor-d: #fff700; --cor-vinho: #800020; --cor-borda: #ddd; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: #f4f7f6; overflow: hidden; }
        
        /* SIDEBAR */
        .sidebar { width: 290px; background: white; padding: 12px; border-right: 1px solid #ddd; overflow-y: auto; box-shadow: 2px 0 10px rgba(0,0,0,0.05); flex-shrink: 0; }
        .sidebar h2 { font-size: 0.9rem; margin-top: 0; color: #2c3e50; border-bottom: 2px solid #38a169; padding-bottom: 5px; }
        .campo { margin-bottom: 8px; }
        label { display: block; font-size: 10px; font-weight: bold; margin-bottom: 2px; color: #666; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 5px; border: 1px solid #cbd5e0; border-radius: 4px; box-sizing: border-box; font-size: 12px; }
        
        .btn-salvar { width: 100%; padding: 10px; background: #38a169; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 5px; font-size: 13px; }
        .btn-excluir { width: 100%; padding: 8px; background: #e53e3e; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 15px; font-size: 11px; display: none; }
        .btn-limpar { width: 100%; padding: 5px; background: #718096; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 5px; font-size: 10px; display: none; }
        .btn-extras { background: #3182ce; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; width: 100%; font-size: 11px; font-weight: bold; margin: 10px 0; }

        #secao-extras { display: none; background: #f8fafc; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px; margin-bottom: 10px; }

        /* CONTEÚDO PRINCIPAL */
        .main-content { flex: 1; padding: 5px 10px; overflow-y: auto; display: flex; flex-direction: column; background: #edf2f7; }
        .topo-controles { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; position: sticky; top: 0; z-index: 100; background: #edf2f7; padding: 10px 5px; }
        .controles-esquerda { display: flex; gap: 10px; }
        .controles-direita { display: flex; gap: 8px; }

        .btn-nav { padding: 8px 12px; cursor: pointer; background: white; border: 1px solid #cbd5e0; border-radius: 4px; font-weight: bold; font-size: 11px; }
        .btn-hoje { background: #3182ce; color: white; border: none; }
        .btn-print { background: #2d3748; color: white; border: none; }
        .btn-faxina { background: #805ad5; color: white; border: none; }

        /* TABELAS DO MAPA */
        .mes-container { margin-bottom: 15px; background: white; border-radius: 6px; padding: 5px; box-shadow: 0 1px 5px rgba(0,0,0,0.05); width: 100%; box-sizing: border-box; }
        .titulo-mes-tabela { font-weight: bold; color: #2d3748; margin-bottom: 3px; font-size: 12px; text-transform: uppercase; padding-left: 5px; }
        
        table { border-collapse: collapse; width: 100%; table-layout: fixed; }
        th, td { border: 1px solid var(--cor-borda); height: 26px; text-align: center; font-size: 9px; }
        .col-apto { width: 130px; text-align: left; padding-left: 8px; background: #f8f9fa; font-weight: bold; }
        .cabecalho-dias { background: #2d3748; color: white; height: 18px; }
        .cabecalho-semana { background: #f1f5f9; color: #4a5568; height: 16px; font-size: 8px; font-weight: bold; }
        
        .reserva-p, .reserva-d { font-size: 11px; font-weight: bold; color: #000; cursor: pointer; }
        .reserva-p { background-color: var(--cor-p); }
        .reserva-d { background-color: var(--cor-d); }
        .reserva-vinho { background-color: var(--cor-vinho); } 
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 3000; justify-content: center; align-items: center; }
        .modal-box { background: white; padding: 20px; border-radius: 10px; text-align: center; max-width: 350px; width: 90%; }
        .btn-modal { padding: 8px 18px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin: 5px; font-size: 13px; }

        /* --- CONFIGURAÇÕES DE IMPRESSÃO --- */
        #area-impressao { display: none; }
        @media print {
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            body * { visibility: hidden; }
            #area-impressao, #area-impressao * { visibility: visible; }
            #area-impressao { display: block !important; position: absolute; left: 0; top: 0; width: 100%; background: white; }
            
            /* Mapa (Paisagem) */
            .print-mapa { page-break-after: always; width: 100%; }
            .mes-print { margin-bottom: 10px !important; border: 1px solid #000 !important; }
            .mes-print table td { height: 38px !important; font-size: 10px !important; }

            /* Faxina (Retrato - Estilo Modelo) */
            .faxina-folha { padding: 0.5in; font-family: Arial, sans-serif; }
            .faxina-titulo { font-size: 24px; font-weight: normal; margin-bottom: 20px; text-transform: uppercase; }
            .faxina-tabela { width: 100%; border: 1px solid black; border-collapse: collapse; }
            .faxina-tabela th { background-color: #999 !important; color: black; border: 1px solid black; padding: 5px; font-weight: normal; }
            .faxina-tabela td { border: 1px solid black; padding: 5px; height: auto !important; font-size: 14px !important; text-align: center; }
            .faxina-tabela td.text-right { text-align: right; padding-right: 10px; }
            .faxina-tabela td.bg-gray { background-color: #999 !important; font-weight: bold; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 id="form-titulo">Nova Reserva</h2>
    <input type="hidden" id="edit_id">

    <div class="campo"><label>Apartamento *</label><select id="apto_id" onchange="verificarReserva()"></select></div>
    <div class="campo"><label>Hóspede Principal *</label><input type="text" id="guest_principal"></div>
    
    <div style="display: flex; gap: 5px;">
        <div class="campo" style="flex: 1;"><label>Check-In *</label><input type="date" id="data_checkin" onchange="verificarReserva()"></div>
        <div class="campo" style="flex: 1;"><label>Check-Out *</label><input type="date" id="data_checkout" onchange="verificarReserva()"></div>
    </div>
    
    <div class="campo"><label>Noites</label><input type="text" id="noites" readonly style="background: #f0f0f0; font-weight: bold;"></div>
    
    <div class="campo">
        <label>Origem *</label>
        <select id="origem">
            <option value="Booking">Booking</option><option value="AirBnb">AirBnb</option>
            <option value="VRBO">VRBO</option><option value="D">Direto (D)</option><option value="P">Pendente (P)</option>
        </select>
    </div>

    <div class="campo"><label>Invoice / ID</label><input type="text" id="invoice_id"></div>
    <div class="campo"><label>Ayrton (ID Reserva)</label><input type="text" id="ayrton_reserva_id"></div>
    <div class="campo"><label>Adultos</label><input type="number" id="num_adultos" value="3"></div>
    
    <div class="campo"><label>OBS:</label><textarea id="observacoes" rows="2"></textarea></div>

    <button type="button" class="btn-extras" onclick="toggleExtras()">Exibir Campos Extras</button>
    
    <div id="secao-extras">
        <div class="campo"><label>Hóspede 2</label><input type="text" id="guest_2"></div>
        <div class="campo"><label>Hóspede 3</label><input type="text" id="guest_3"></div>
        <div class="campo"><label>Hóspede 4</label><input type="text" id="guest_4"></div>
        <div class="campo"><label>Hóspede 5</label><input type="text" id="guest_5"></div>
        <div class="campo"><label>Hóspede 6</label><input type="text" id="guest_6"></div>
        <div class="campo"><label>Nº Crianças</label><input type="number" id="num_criancas" value="0"></div>
        <div class="campo"><label>Código Porta 1</label><input type="text" id="codigo_porta_1"></div>
        <div class="campo"><label>Código Porta 2</label><input type="text" id="codigo_porta_2"></div>
        
        <hr>
        <div class="campo"><label>Valor Creditado (R$)</label><input type="number" step="0.01" id="valor_creditado"></div>
        <div class="campo"><label>Data Crédito</label><input type="date" id="data_credito"></div>
        
        <div class="campo"><label>Valor Comissão (R$)</label><input type="number" step="0.01" id="valor_comissao"></div>
        <div class="campo"><label>Data Comissão</label><input type="date" id="data_comissao"></div>
        
        <div class="campo"><label>Usuário que Alterou</label><input type="text" id="usuario_alterou" readonly style="background:#eee"></div>
        <div class="campo"><label>Data Alteração</label><input type="text" id="data_alteracao" readonly style="background:#eee"></div>
    </div>

    <button id="btn-salvar" class="btn-salvar" onclick="salvarFinal()">Salvar Reserva</button>
    <button id="btn-limpar" class="btn-limpar" onclick="resetarFormulario()">Novo (Limpar)</button>
    <button id="btn-excluir" class="btn-excluir" onclick="confirmarExclusao()">Excluir / Cancelar Reserva</button>
</div>

<div class="main-content">
    <div class="topo-controles">
        <div class="controles-esquerda">
            <button class="btn-nav btn-print" onclick="imprimirMapa4Meses()">🖨️ Imprimir Mapa de Reservas</button>
            <button class="btn-nav btn-faxina" onclick="abrirModalEscolhaFaxina()">🧹 Imprimir Faxina</button>
        </div>
        <div class="controles-direita">
            <button class="btn-nav" onclick="mudarMes(-1)">◀ ANTERIOR</button>
            <button class="btn-nav btn-hoje" onclick="irParaHoje()">HOJE</button>
            <button class="btn-nav" onclick="mudarMes(1)">PRÓXIMO ▶</button>
        </div>
    </div>
    <div id="area-mapas"></div>
</div>

<div id="area-impressao"></div>

<!-- Modal para Escolher Mês da Faxina -->
<div id="modalFaxina" class="modal-overlay">
    <div class="modal-box">
        <h3>Escolher Mês do Relatório</h3>
        <div class="campo">
            <label>Mês:</label>
            <select id="sel_mes_faxina">
                <option value="0">Janeiro</option><option value="1">Fevereiro</option><option value="2">Março</option>
                <option value="3">Abril</option><option value="4">Maio</option><option value="5">Junho</option>
                <option value="6">Julho</option><option value="7">Agosto</option><option value="8">Setembro</option>
                <option value="9">Outubro</option><option value="10">Novembro</option><option value="11">Dezembro</option>
            </select>
        </div>
        <div class="campo">
            <label>Ano:</label>
            <input type="number" id="sel_ano_faxina" value="2026">
        </div>
        <button class="btn-modal" style="background:#38a169;color:white" onclick="gerarRelatorioFaxinaFinal()">Gerar Relatório</button>
        <button class="btn-modal" style="background:#718096;color:white" onclick="fecharModais()">Cancelar</button>
    </div>
</div>

<!-- Outros Modais -->
<div id="modalErro" class="modal-overlay"><div class="modal-box"><h3 style="color:#e53e3e">Aviso</h3><p id="msgErro"></p><button class="btn-modal" style="background:#e53e3e;color:white" onclick="fecharModais()">OK</button></div></div>
<div id="modalSucesso" class="modal-overlay"><div class="modal-box"><h3>✔ Sucesso!</h3><p id="msgSucessoTxt"></p><button class="btn-modal" style="background:#38a169;color:white" onclick="location.reload()">OK</button></div></div>
<div id="modalConfirmarExcluir" class="modal-overlay"><div class="modal-box"><h3>Excluir Reserva?</h3><p>Esta ação removerá os dados permanentemente.</p><button class="btn-modal" style="background:#e53e3e;color:white" onclick="excluirDeVez()">Confirmar Exclusão</button><button class="btn-modal" style="background:#718096;color:white" onclick="fecharModais()">Cancelar</button></div></div>

<script>
    const SB_URL = "https://eqoayyftpddombylgxpw.supabase.co";
    const SB_KEY = "sb_publishable_52ePL6AdYLm58359gM4VJg_x5bfdamZ";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    let mesBase = new Date(); mesBase.setDate(1);
    let aptosGlobais = [];
    let reservasGlobais = [];
    const diasSemanaNomes = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];

    function fmt(d) { if(!d) return ""; return d.toString().split('T')[0].split(' ')[0].trim(); }

    async function init() {
        const { data: aptos } = await supabaseClient.from('apartamentos').select('*').order('nome_apto');
        aptosGlobais = aptos || [];
        const select = document.getElementById('apto_id');
        select.innerHTML = '<option value="">Selecione...</option>';
        aptosGlobais.forEach(a => select.innerHTML += `<option value="${a.id}">${a.nome_apto}</option>`);
        
        document.getElementById('sel_ano_faxina').value = new Date().getFullYear();
        document.getElementById('sel_mes_faxina').value = new Date().getMonth();

        renderizarMapaTriplo();
    }

    async function renderizarMapaTriplo() {
        const { data: reservas } = await supabaseClient.from('reservas').select('*');
        reservasGlobais = reservas || [];
        const area = document.getElementById('area-mapas');
        area.innerHTML = "";
        for (let i = 0; i < 3; i++) {
            const dataFoco = new Date(mesBase.getFullYear(), mesBase.getMonth() + i, 1);
            area.appendChild(criarTabelaMes(dataFoco, reservasGlobais));
        }
    }

    function criarTabelaMes(dataRef, reservas) {
        const ano = dataRef.getFullYear(); const mes = dataRef.getMonth();
        const ultimoDia = new Date(ano, mes + 1, 0).getDate();
        const container = document.createElement('div'); container.className = 'mes-container';
        const titulo = document.createElement('div'); titulo.className = 'titulo-mes-tabela';
        titulo.innerText = dataRef.toLocaleString('pt-BR', { month: 'long', year: 'numeric' });
        container.appendChild(titulo);

        let html = `<table><thead><tr class="cabecalho-dias"><th class="col-apto">Dia</th>`;
        for (let d = 1; d <= ultimoDia; d++) html += `<th>${d}</th>`;
        html += `</tr><tr class="cabecalho-semana"><th class="col-apto">Apto</th>`;
        for (let d = 1; d <= ultimoDia; d++) html += `<th>${diasSemanaNomes[new Date(ano, mes, d).getDay()]}</th>`;
        html += `</tr></thead><tbody>`;

        aptosGlobais.forEach(apto => {
            html += `<tr><td class="col-apto">${apto.nome_apto}</td>`;
            for (let d = 1; d <= ultimoDia; d++) {
                const dIso = new Date(ano, mes, d).toISOString().split('T')[0];
                const resA = reservas.find(r => r.apto_id === apto.id && dIso >= fmt(r.data_checkin) && dIso <= fmt(r.data_checkout));
                if (resA && (dIso === fmt(resA.data_checkin) || d === 1)) {
                    let dur = 1; let tempD = d + 1;
                    while(tempD <= ultimoDia) {
                        const dL = new Date(ano, mes, tempD).toISOString().split('T')[0];
                        if (dL > fmt(resA.data_checkout)) break;
                        dur++; tempD++;
                    }
                    const cod = {'Booking':'B','AirBnb':'A','VRBO':'V','D':'D','P':'P'}[resA.origem] || "R";
                    html += `<td colspan="${dur}" class="${(resA.origem === 'P') ? 'reserva-p' : 'reserva-d'}" onclick="prepararEdicao('${resA.id}')">${cod} - ${resA.guest_principal}</td>`;
                    d += (dur - 1);
                } else html += `<td></td>`;
            }
            html += `</tr>`;
        });
        html += `</tbody></table>`; container.innerHTML += html; return container;
    }

    // FAXINA FUNÇÕES
    function abrirModalEscolhaFaxina() { document.getElementById('modalFaxina').style.display = 'flex'; }

    function gerarRelatorioFaxinaFinal() {
        const mesSel = parseInt(document.getElementById('sel_mes_faxina').value);
        const anoSel = parseInt(document.getElementById('sel_ano_faxina').value);
        
        const style = document.createElement('style');
        style.innerHTML = "@page { size: letter portrait; margin: 0.5in; }";
        document.head.appendChild(style);

        const area = document.getElementById('area-impressao');
        area.innerHTML = "";

        const dataRef = new Date(anoSel, mesSel, 1);
        const mesNome = dataRef.toLocaleString('pt-BR', { month: 'long', year: 'numeric' });
        
        // Coletar todas as faxinas (checkouts) do mês escolhido
        let listaFaxinas = [];
        reservasGlobais.forEach(r => {
            const dOut = new Date(r.data_checkout + "T12:00:00");
            if (dOut.getMonth() === mesSel && dOut.getFullYear() === anoSel) {
                const apto = aptosGlobais.find(a => a.id === r.apto_id);
                listaFaxinas.push({
                    data: r.data_checkout,
                    apto: apto ? apto.nome_apto : "N/A",
                    valor: apto ? (apto.preco_faxina || 0) : 0
                });
            }
        });

        // Ordenar por data
        listaFaxinas.sort((a, b) => new Date(a.data) - new Date(b.data));

        const folha = document.createElement('div');
        folha.className = 'faxina-folha';
        
        let html = `<div class="faxina-titulo">Relatório de Faxinas - ${mesNome.toUpperCase()}</div>`;
        html += `<table class="faxina-tabela">
                    <thead>
                        <tr>
                            <th>Item</th>
                            <th>Data:</th>
                            <th>Apartamento:</th>
                            <th>Valor:</th>
                        </tr>
                    </thead>
                    <tbody>`;
        
        let totalGeral = 0;
        listaFaxinas.forEach((f, idx) => {
            const dataFmt = f.data.split('-').reverse().join('/');
            html += `<tr>
                        <td>${idx + 1}</td>
                        <td>${dataFmt}</td>
                        <td>${f.apto}</td>
                        <td>$${f.valor.toFixed(2)}</td>
                    </tr>`;
            totalGeral += f.valor;
        });

        html += `<tr>
                    <td colspan="3" class="text-right"><strong>TOTAL GERAL A PAGAR NO MÊS: ➔</strong></td>
                    <td class="bg-gray">$${totalGeral.toFixed(2)}</td>
                </tr>
                </tbody></table>`;

        folha.innerHTML = html;
        area.appendChild(folha);

        fecharModais();
        window.print();
        style.remove();
    }

    function fecharModais() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); }
    function mudarMes(v) { mesBase.setMonth(mesBase.getMonth() + v); renderizarMapaTriplo(); }
    function irParaHoje() { mesBase = new Date(); mesBase.setDate(1); renderizarMapaTriplo(); }
    function toggleExtras() {
        const div = document.getElementById('secao-extras');
        div.style.display = (div.style.display === 'block') ? 'none' : 'block';
    }

    // IMPRESSÃO MAPA
    function imprimirMapa4Meses() {
        const style = document.createElement('style');
        style.innerHTML = "@page { size: letter landscape; margin: 0.2in; }";
        document.head.appendChild(style);
        const area = document.getElementById('area-impressao');
        area.innerHTML = "";
        let dataLoop = new Date(mesBase);
        for (let i = 0; i < 8; i += 4) {
            const folha = document.createElement('div');
            folha.className = 'print-mapa';
            for (let j = 0; j < 4; j++) {
                const df = new Date(dataLoop.getFullYear(), dataLoop.getMonth() + i + j, 1);
                const mesBloco = criarTabelaMes(df, reservasGlobais);
                mesBloco.classList.add('mes-print');
                folha.appendChild(mesBloco);
            }
            area.appendChild(folha);
        }
        window.print();
        style.remove();
    }

    init();
</script>
</body>
</html>
