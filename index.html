<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel The Point - Multi-Mapa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --cor-p: #add8e6; --cor-d: #fff700; --cor-vinho: #800020; --cor-borda: #ddd; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: #f4f7f6; overflow: hidden; }
        
        .sidebar { width: 300px; background: white; padding: 15px; border-right: 1px solid #ddd; overflow-y: auto; box-shadow: 2px 0 10px rgba(0,0,0,0.05); flex-shrink: 0; }
        .sidebar h2 { font-size: 1rem; margin-top: 0; color: #2c3e50; border-bottom: 2px solid #38a169; padding-bottom: 5px; }
        .campo { margin-bottom: 10px; }
        label { display: block; font-size: 10px; font-weight: bold; margin-bottom: 3px; color: #666; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 6px; border: 1px solid #cbd5e0; border-radius: 4px; box-sizing: border-box; font-size: 13px; }
        .btn-salvar { width: 100%; padding: 10px; background: #38a169; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 5px; font-size: 14px; }
        
        .main-content { flex: 1; padding: 10px; overflow-y: auto; display: flex; flex-direction: column; background: #edf2f7; }
        .topo-controles { display: flex; justify-content: center; align-items: center; margin-bottom: 10px; gap: 10px; position: sticky; top: 0; z-index: 100; background: #edf2f7; padding: 5px; }
        .btn-nav { padding: 6px 12px; cursor: pointer; background: white; border: 1px solid #cbd5e0; border-radius: 4px; font-weight: bold; font-size: 12px; }
        .btn-hoje { background: #3182ce; color: white; border: none; }

        .mes-container { margin-bottom: 25px; background: white; border-radius: 8px; padding: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .titulo-mes-tabela { font-weight: bold; color: #2d3748; margin-bottom: 5px; font-size: 14px; text-transform: uppercase; padding-left: 5px; }
        
        table { border-collapse: collapse; width: 100%; table-layout: fixed; }
        th, td { border: 1px solid var(--cor-borda); height: 28px; text-align: center; font-size: 10px; overflow: hidden; white-space: nowrap; }
        
        .col-apto { width: 140px; text-align: left; padding-left: 8px; background: #f8f9fa; font-weight: bold; font-size: 10px; }
        .cabecalho-dias { background: #2d3748; color: white; }
        
        .reserva-p { background-color: var(--cor-p); color: #000; font-weight: 600; }
        .reserva-d { background-color: var(--cor-d); color: #000; font-weight: 600; }
        .reserva-vinho { background-color: var(--cor-vinho); border: none; } 
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 3000; justify-content: center; align-items: center; }
        .modal-box { background: white; padding: 20px; border-radius: 10px; text-align: center; max-width: 350px; width: 90%; }
        .btn-modal { padding: 8px 18px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin: 5px; font-size: 13px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Nova Reserva</h2>
    <div class="campo">
        <label>Apartamento *</label>
        <select id="apto_id" onchange="verificarReserva()"></select>
    </div>
    <div class="campo">
        <label>Hóspede Principal *</label>
        <input type="text" id="guest_principal">
    </div>
    <div style="display: flex; gap: 8px;">
        <div class="campo" style="flex: 1;">
            <label>Check-In *</label>
            <input type="date" id="data_checkin" onchange="verificarReserva()">
        </div>
        <div class="campo" style="flex: 1;">
            <label>Check-Out *</label>
            <input type="date" id="data_checkout" onchange="verificarReserva()">
        </div>
    </div>
    <div class="campo">
        <label>Noites</label>
        <input type="text" id="noites" readonly style="background: #f0f0f0; font-weight: bold;">
    </div>
    <div class="campo">
        <label>Origem *</label>
        <select id="origem">
            <option value="Booking">Booking</option>
            <option value="AirBnb">AirBnb</option>
            <option value="VRBO">VRBO</option>
            <option value="D">Direto (D)</option>
            <option value="P">Pendente (P)</option>
        </select>
    </div>
    <div class="campo">
        <label>Valor Creditado (R$)</label>
        <input type="number" step="0.01" id="valor_creditado">
    </div>
    <div class="campo">
        <label>OBS:</label>
        <textarea id="observacoes" rows="2"></textarea>
    </div>
    <button class="btn-salvar" onclick="salvarFinal()">Salvar Reserva</button>
</div>

<div class="main-content">
    <div class="topo-controles">
        <button class="btn-nav" onclick="mudarMes(-1)">◀ ANTERIOR</button>
        <button class="btn-nav btn-hoje" onclick="irParaHoje()">HOJE</button>
        <button class="btn-nav" onclick="mudarMes(1)">PRÓXIMO ▶</button>
    </div>
    <div id="area-mapas"></div>
</div>

<div id="modalErro" class="modal-overlay"><div class="modal-box"><h3 style="color:#e53e3e">Bloqueado</h3><p id="msgErro"></p><button class="btn-modal" style="background:#e53e3e;color:white" onclick="fecharModais()">OK</button></div></div>
<div id="modalAlerta" class="modal-overlay"><div class="modal-box"><h3 style="color:#d69e2e">Atenção</h3><p id="msgAlerta"></p><button class="btn-modal" style="background:#38a169;color:white" onclick="confirmarAlerta()">Continuar</button><button class="btn-modal" style="background:#718096;color:white" onclick="limparDatas()">Corrigir</button></div></div>
<div id="modalSucesso" class="modal-overlay"><div class="modal-box"><h3>✔ Sucesso!</h3><p>Reserva cadastrada.</p><button class="btn-modal" style="background:#38a169;color:white" onclick="location.reload()">OK</button></div></div>

<script>
    const SB_URL = "https://eqoayyftpddombylgxpw.supabase.co";
    const SB_KEY = "sb_publishable_52ePL6AdYLm58359gM4VJg_x5bfdamZ";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    let mesBase = new Date(); 
    mesBase.setDate(1);
    let aptosGlobais = [];
    let minNoites = 4;
    let alertaAceito = false;

    async function init() {
        const { data: aptos } = await supabaseClient.from('apartamentos').select('id, nome_apto').order('nome_apto');
        aptosGlobais = aptos;
        const select = document.getElementById('apto_id');
        select.innerHTML = '<option value="">Selecione...</option>';
        aptos.forEach(a => select.innerHTML += `<option value="${a.id}">${a.nome_apto}</option>`);

        const { data: config } = await supabaseClient.from('configuracoes').select('valor').eq('chave', 'minimo_noites_alerta').single();
        if (config) minNoites = config.valor;

        renderizarMapaTriplo();
    }

    async function renderizarMapaTriplo() {
        const area = document.getElementById('area-mapas');
        area.innerHTML = "Carregando...";
        const { data: reservas } = await supabaseClient.from('reservas').select('*');
        area.innerHTML = "";
        for (let i = 0; i < 3; i++) {
            const dataFoco = new Date(mesBase.getFullYear(), mesBase.getMonth() + i, 1);
            area.appendChild(criarTabelaMes(dataFoco, reservas));
        }
    }

    function criarTabelaMes(dataRef, reservas) {
        const ano = dataRef.getFullYear();
        const mes = dataRef.getMonth();
        const ultimoDia = new Date(ano, mes + 1, 0).getDate();
        
        const container = document.createElement('div');
        container.className = 'mes-container';
        const titulo = document.createElement('div');
        titulo.className = 'titulo-mes-tabela';
        titulo.innerText = dataRef.toLocaleString('pt-BR', { month: 'long', year: 'numeric' });
        container.appendChild(titulo);

        let html = `<table><thead><tr class="cabecalho-dias"><th class="col-apto">Apartamento</th>`;
        for (let d = 1; d <= ultimoDia; d++) html += `<th>${d}</th>`;
        html += `</tr></thead><tbody>`;

        aptosGlobais.forEach(apto => {
            html += `<tr><td class="col-apto">${apto.nome_apto}</td>`;
            for (let d = 1; d <= ultimoDia; d++) {
                const dataIso = new Date(ano, mes, d).toISOString().split('T')[0];
                const ontem = new Date(ano, mes, d - 1);
                const ontemIso = ontem.toISOString().split('T')[0];

                const saindoHoje = reservas.find(r => r.apto_id === apto.id && r.data_checkout === dataIso);
                const entrandoHoje = reservas.find(r => r.apto_id === apto.id && r.data_checkin === dataIso);

                // 1. REGRA VINHO: Turnover. Fica vinho e vazio.
                if (saindoHoje && entrandoHoje) {
                    html += `<td class="reserva-vinho"></td>`;
                } 
                else {
                    // Encontrar reserva ativa hoje
                    const resAtiva = reservas.find(r => r.apto_id === apto.id && dataIso >= r.data_checkin && dataIso < r.data_checkout);

                    if (resAtiva) {
                        // Decidir se começamos a desenhar a barra amarela HOJE
                        let deveComeçarDesenho = false;
                        
                        const saindoOntem = reservas.find(r => r.apto_id === apto.id && r.data_checkout === ontemIso);
                        const entrandoOntem = reservas.find(r => r.apto_id === apto.id && r.data_checkin === ontemIso);
                        const foiTurnoverOntem = (saindoOntem && entrandoOntem);

                        if (dataIso === resAtiva.data_checkin && !saindoHoje) {
                            deveComeçarDesenho = true; // Check-in normal
                        } else if (foiTurnoverOntem && resAtiva.data_checkin === ontemIso) {
                            deveComeçarDesenho = true; // Começa hoje porque ontem foi dia vinho
                        } else if (d === 1) {
                            deveComeçarDesenho = true; // Começa no dia 1 do mês se o cara já está lá
                        }

                        if (deveComeçarDesenho) {
                            let duracaoVisual = 0;
                            let tempD = d;
                            while(tempD <= ultimoDia) {
                                const dIsoL = new Date(ano, mes, tempD).toISOString().split('T')[0];
                                if (dIsoL < resAtiva.data_checkin || dIsoL >= resAtiva.data_checkout) break;
                                
                                const saiL = reservas.find(r => r.apto_id === apto.id && r.data_checkout === dIsoL);
                                const entL = reservas.find(r => r.apto_id === apto.id && r.data_checkin === dIsoL);
                                if (saiL && entL && tempD > d) break; // Para se bater num dia vinho futuro

                                duracaoVisual++;
                                tempD++;
                            }
                            const classe = (resAtiva.origem === 'P') ? 'reserva-p' : 'reserva-d';
                            html += `<td colspan="${duracaoVisual}" class="${classe}">${resAtiva.guest_principal.split(' ')[0]}</td>`;
                            d += (duracaoVisual - 1);
                        } else {
                            html += `<td></td>`;
                        }
                    } else {
                        html += `<td></td>`;
                    }
                }
            }
            html += `</tr>`;
        });
        html += `</tbody></table>`;
        container.innerHTML += html;
        return container;
    }

    function mudarMes(v) { mesBase.setMonth(mesBase.getMonth() + v); renderizarMapaTriplo(); }
    function irParaHoje() { mesBase = new Date(); mesBase.setDate(1); renderizarMapaTriplo(); }

    async function verificarReserva() {
        const apto = document.getElementById('apto_id').value;
        const cin = document.getElementById('data_checkin').value;
        const cout = document.getElementById('data_checkout').value;
        if (!apto || !cin) return;

        const { data: conflito } = await supabaseClient.from('reservas').select('guest_principal')
            .eq('apto_id', apto).lt('data_checkin', cout).gt('data_checkout', cin);

        if (conflito.length > 0) {
            mostrarModal('modalErro', `Conflito com ${conflito[0].guest_principal}.`, 'msgErro');
            document.getElementById('data_checkin').value = "";
            return;
        }
        if (!cout) return;
        const inD = new Date(cin); const outD = new Date(cout);
        const noites = Math.ceil(Math.abs(outD - inD) / (1000 * 60 * 60 * 24));
        document.getElementById('noites').value = outD > inD ? noites : "Erro";

        if (noites < minNoites && !alertaAceito) {
            mostrarModal('modalAlerta', `Estadia curta (${noites} noites).`, 'msgAlerta');
        }
    }

    function mostrarModal(id, msg, idT) { document.getElementById(idT).innerText = msg; document.getElementById(id).style.display = 'flex'; }
    function fecharModais() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); }
    function confirmarAlerta() { alertaAceito = true; fecharModais(); verificarReserva(); }
    function limparDatas() { document.getElementById('data_checkin').value = ""; document.getElementById('data_checkout').value = ""; fecharModais(); }

    async function salvarFinal() {
        const r = {
            apto_id: document.getElementById('apto_id').value,
            guest_principal: document.getElementById('guest_principal').value,
            data_checkin: document.getElementById('data_checkin').value,
            data_checkout: document.getElementById('data_checkout').value,
            noites: document.getElementById('noites').value,
            origem: document.getElementById('origem').value,
            valor_creditado: document.getElementById('valor_creditado').value || 0,
            observacoes: document.getElementById('observacoes').value
        };
        const { error } = await supabaseClient.from('reservas').insert([r]);
        if (!error) document.getElementById('modalSucesso').style.display = 'flex';
    }
    init();
</script>
</body>
</html>
