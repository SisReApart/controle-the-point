<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva - The Point</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f7; padding: 20px; color: #333; }
        .container { max-width: 600px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin: auto; }
        h2 { color: #2c3e50; text-align: center; margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .campo { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; color: #444; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #cbd5e0; border-radius: 6px; box-sizing: border-box; font-size: 15px; }
        input:focus { outline: none; border-color: #3182ce; box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.2); }
        .btn-salvar { width: 100%; padding: 14px; background-color: #38a169; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .btn-salvar:disabled { background-color: #a0aec0; cursor: not-allowed; }
        .btn-extras { background-color: #3182ce; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; margin-bottom: 15px; font-size: 14px; }
        #secao-extras { display: none; background: #f8fafc; padding: 20px; border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 18px; }
        
        /* Sistema de Modais Customizados */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; }
        .modal-box { background: white; padding: 30px; border-radius: 12px; max-width: 400px; width: 90%; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .modal-box h3 { margin-top: 0; font-size: 22px; }
        
        /* Cores dos Modais */
        .modal-erro h3 { color: #e53e3e; }
        .modal-alerta h3 { color: #d69e2e; }
        .modal-sucesso h3 { color: #38a169; }
        
        .btn-modal { padding: 12px 30px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 15px; margin: 10px 5px 0 5px; }
        .btn-ok-erro { background: #e53e3e; color: white; }
        .btn-continuar { background: #38a169; color: white; }
        .btn-cancelar { background: #718096; color: white; }
        .btn-ok-sucesso { background: #38a169; color: white; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <h2>Nova Reserva - The Point</h2>
    
    <div class="campo">
        <label>Apartamento *</label>
        <select id="apto_id" onchange="validarDatas()"></select>
    </div>

    <div class="campo">
        <label>Hóspede Principal (Guest) *</label>
        <input type="text" id="guest_principal" placeholder="Ex: João Silva">
    </div>

    <div style="display: flex; gap: 15px;">
        <div class="campo" style="flex: 1;">
            <label>Check-In *</label>
            <input type="date" id="data_checkin" onchange="validarDatas()">
        </div>
        <div class="campo" style="flex: 1;">
            <label>Check-Out *</label>
            <input type="date" id="data_checkout" onchange="validarDatas()">
        </div>
    </div>

    <div class="campo">
        <label>Noites</label>
        <input type="text" id="noites" readonly style="background: #edf2f7;">
    </div>

    <div class="campo">
        <label>Origem (Fonte) *</label>
        <select id="origem">
            <option value="Booking">Booking</option>
            <option value="AirBnb">AirBnb</option>
            <option value="VRBO">VRBO</option>
            <option value="D">Direto (D)</option>
            <option value="P">Pendente (P)</option>
        </select>
    </div>

    <button type="button" class="btn-extras" onclick="toggleExtras()">+ Adicionar hóspedes extras / Infos</button>

    <div id="secao-extras">
        <div class="campo"><label>Guest 2</label><input type="text" id="guest_2"></div>
        <div class="campo"><label>Guest 3</label><input type="text" id="guest_3"></div>
        <div style="display: flex; gap: 10px;">
            <div class="campo"><label>Adultos</label><input type="number" id="num_adultos" value="1"></div>
            <div class="campo"><label>Crianças</label><input type="number" id="num_criancas" value="0"></div>
        </div>
        <div class="campo"><label>Código Porta 1</label><input type="text" id="codigo_porta_1"></div>
    </div>

    <div class="campo">
        <label>Valor Creditado (R$)</label>
        <input type="number" step="0.01" id="valor_creditado" placeholder="0.00">
    </div>

    <button id="btnSalvar" class="btn-salvar" onclick="salvarFinal()">Salvar Reserva</button>
</div>

<!-- MODAL DE ERRO (BLOQUEIO) -->
<div id="modalErro" class="modal-overlay">
    <div class="modal-box modal-erro">
        <h3>Indisponível</h3>
        <p id="msgErro"></p>
        <button class="btn-modal btn-ok-erro" onclick="fecharModais()">Corrigir</button>
    </div>
</div>

<!-- MODAL DE ALERTA (JANELA 4 DIAS) -->
<div id="modalAlerta" class="modal-overlay">
    <div class="modal-box modal-alerta">
        <h3>Atenção</h3>
        <p id="msgAlerta"></p>
        <button class="btn-modal btn-continuar" onclick="confirmarAlerta()">Estou ciente / Continuar</button>
        <button class="btn-modal btn-cancelar" onclick="limparDatas()">Corrigir Datas</button>
    </div>
</div>

<!-- NOVO MODAL DE SUCESSO -->
<div id="modalSucesso" class="modal-overlay">
    <div class="modal-box modal-sucesso">
        <h3>✔ Sucesso!</h3>
        <p id="msgSucesso">A reserva foi salva corretamente.</p>
        <button class="btn-modal btn-ok-sucesso" onclick="recarregarPagina()">OK</button>
    </div>
</div>

<script>
    const SB_URL = "https://eqoayyftpddombylgxpw.supabase.co";
    const SB_KEY = "sb_publishable_52ePL6AdYLm58359gM4VJg_x5bfdamZ"; 
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    let minNoitesAlerta = 4;
    let alertaConfirmado = false;

    async function carregarDados() {
        const { data: aptos } = await supabaseClient.from('apartamentos').select('id, nome_apto').order('nome_apto');
        const select = document.getElementById('apto_id');
        select.innerHTML = '<option value="">Selecione o Apartamento</option>';
        aptos.forEach(a => select.innerHTML += `<option value="${a.id}">${a.nome_apto}</option>`);

        const { data: config } = await supabaseClient.from('configuracoes').select('valor').eq('chave', 'minimo_noites_alerta').single();
        if (config) minNoitesAlerta = config.valor;
    }
    carregarDados();

    function toggleExtras() {
        const div = document.getElementById('secao-extras');
        div.style.display = div.style.display === 'block' ? 'none' : 'block';
    }

    async function validarDatas() {
        const apto = document.getElementById('apto_id').value;
        const checkin = document.getElementById('data_checkin').value;
        const checkout = document.getElementById('data_checkout').value;

        if (!apto || !checkin) return;

        const { data: conflitoCheckin } = await supabaseClient.from('reservas')
            .select('guest_principal')
            .eq('apto_id', apto)
            .lte('data_checkin', checkin)
            .gt('data_checkout', checkin);

        if (conflitoCheckin.length > 0) {
            mostrarModal('modalErro', `Não é possível fazer check-in nesta data. O apartamento estará ocupado por ${conflitoCheckin[0].guest_principal}.`, 'msgErro');
            document.getElementById('data_checkin').value = "";
            return;
        }

        if (!checkout) return;

        const inDate = new Date(checkin);
        const outDate = new Date(checkout);
        const diffDays = Math.ceil(Math.abs(outDate - inDate) / (1000 * 60 * 60 * 24));
        document.getElementById('noites').value = outDate > inDate ? diffDays : "Data inválida";

        if (outDate <= inDate) {
            mostrarModal('modalErro', "O Check-out deve ser posterior ao Check-in.", 'msgErro');
            document.getElementById('data_checkout').value = "";
            return;
        }

        const { data: conflitoPeriodo } = await supabaseClient.from('reservas')
            .select('guest_principal')
            .eq('apto_id', apto)
            .lt('data_checkin', checkout)
            .gt('data_checkout', checkin);

        if (conflitoPeriodo.length > 0) {
            mostrarModal('modalErro', `Conflito: O período selecionado sobrepõe a reserva de ${conflitoPeriodo[0].guest_principal}.`, 'msgErro');
            document.getElementById('data_checkout').value = "";
            return;
        }

        const dataFimJanela = new Date(checkin);
        dataFimJanela.setDate(dataFimJanela.getDate() + minNoitesAlerta);
        const dataFimStr = dataFimJanela.toISOString().split('T')[0];

        const { data: proximos } = await supabaseClient.from('reservas')
            .select('data_checkin')
            .eq('apto_id', apto)
            .gt('data_checkin', checkin)
            .lte('data_checkin', dataFimStr);

        if (proximos.length > 0 && !alertaConfirmado) {
            mostrarModal('modalAlerta', `Atenção: Existe uma reserva começando nas próximas ${minNoitesAlerta} noites.`, 'msgAlerta');
        }
    }

    function mostrarModal(id, msg, idTexto) {
        document.getElementById(idTexto).innerText = msg;
        document.getElementById(id).style.display = 'flex';
    }

    function fecharModais() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); }
    function confirmarAlerta() { alertaConfirmado = true; fecharModais(); }
    function limparDatas() { document.getElementById('data_checkin').value = ""; document.getElementById('data_checkout').value = ""; fecharModais(); }
    function recarregarPagina() { location.reload(); }

    async function salvarFinal() {
        const apto = document.getElementById('apto_id').value;
        const guest = document.getElementById('guest_principal').value;
        const checkin = document.getElementById('data_checkin').value;
        const checkout = document.getElementById('data_checkout').value;

        if (!apto || !guest || !checkin || !checkout) {
            mostrarModal('modalErro', "Preencha todos os campos obrigatórios (*)", 'msgErro');
            return;
        }

        const reserva = {
            apto_id: apto,
            guest_principal: guest,
            data_checkin: checkin,
            data_checkout: checkout,
            noites: document.getElementById('noites').value,
            origem: document.getElementById('origem').value,
            guest_2: document.getElementById('guest_2').value,
            num_adultos: document.getElementById('num_adultos').value,
            num_criancas: document.getElementById('num_criancas').value,
            codigo_porta_1: document.getElementById('codigo_porta_1').value,
            valor_creditado: document.getElementById('valor_creditado').value || 0
        };

        const { error } = await supabaseClient.from('reservas').insert([reserva]);
        if (error) {
            mostrarModal('modalErro', "Erro ao salvar: " + error.message, 'msgErro');
        } else {
            document.getElementById('modalSucesso').style.display = 'flex';
        }
    }
</script>
</body>
</html>
