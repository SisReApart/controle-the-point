<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel The Point - Gestão Completa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --cor-p: #4299e1; --cor-d: #fff700; --cor-vinho: #800020; --cor-borda: #ddd; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: #f4f7f6; overflow: hidden; }
        
        /* SIDEBAR REESTRUTURADA */
        .sidebar { width: 320px; background: white; padding: 12px; border-right: 1px solid #ddd; overflow-y: auto; flex-shrink: 0; }
        .sidebar h2 { font-size: 0.9rem; margin-top: 0; color: #2c3e50; border-bottom: 2px solid #38a169; padding-bottom: 5px; margin-bottom: 10px; }
        
        .campo { margin-bottom: 8px; }
        .linha-dupla { display: flex; gap: 8px; margin-bottom: 8px; }
        .col-70 { flex: 0 0 65%; }
        .col-30 { flex: 1; }
        .col-50 { flex: 1; }

        label { display: block; font-size: 9px; font-weight: bold; margin-bottom: 2px; color: #666; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 5px; border: 1px solid #cbd5e0; border-radius: 4px; box-sizing: border-box; font-size: 11px; }
        
        .btn-salvar { width: 100%; padding: 10px; background: #38a169; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 5px; font-size: 12px; }
        .btn-limpar { width: 100%; padding: 6px; background: #718096; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 5px; font-size: 10px; }
        .btn-excluir { width: 100%; padding: 6px; background: #e53e3e; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 5px; font-size: 10px; display: none; }
        .btn-historico { width: 100%; padding: 8px; background: #2d3748; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 10px; font-size: 11px; }
        .btn-import { width: 100%; padding: 8px; background: #ed8936; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 5px; font-size: 11px; }

        /* CONTEÚDO PRINCIPAL */
        .main-content { flex: 1; padding: 5px 10px; overflow-y: auto; display: flex; flex-direction: column; background: #edf2f7; }
        .topo-controles { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; position: sticky; top: 0; z-index: 100; background: #edf2f7; padding: 10px 5px; }
        .controles-esquerda, .controles-direita { display: flex; gap: 8px; }

        .btn-nav { padding: 8px 12px; cursor: pointer; background: white; border: 1px solid #cbd5e0; border-radius: 4px; font-weight: bold; font-size: 11px; }
        .btn-hoje { background: #3182ce; color: white; border: none; }
        .btn-print { background: #2d3748; color: white; border: none; }
        .btn-faxina { background: #805ad5; color: white; border: none; }

        /* TABELA MAPA */
        .mes-container { margin-bottom: 15px; background: white; border-radius: 6px; padding: 5px; box-shadow: 0 1px 5px rgba(0,0,0,0.05); width: 100%; }
        .titulo-mes-tabela { font-weight: bold; color: #2d3748; margin-bottom: 3px; font-size: 12px; text-transform: uppercase; padding-left: 5px; }
        table { border-collapse: collapse; width: 100%; table-layout: fixed; }
        th, td { border: 1px solid var(--cor-borda); height: 26px; text-align: center; font-size: 9px; overflow: hidden; white-space: nowrap; text-overflow: clip; }
        .col-apto { width: 130px; text-align: left; padding-left: 8px; background: #f8f9fa; font-weight: bold; }
        .cabecalho-dias { background: #2d3748; color: white; height: 18px; }
        .cabecalho-semana { background: #f1f5f9; color: #4a5568; height: 16px; font-size: 8px; }
        .reserva-p { background-color: var(--cor-p); font-weight: bold; cursor: pointer; }
        .reserva-d { background-color: var(--cor-d); font-weight: bold; cursor: pointer; }
        .reserva-vinho { background-color: var(--cor-vinho); } 

        /* MODAIS */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 3000; justify-content: center; align-items: center; }
        .modal-box { background: white; padding: 20px; border-radius: 10px; text-align: center; max-width: 90%; width: 500px; max-height: 90vh; overflow-y: auto; }
        
        /* IMPRESSÃO MAPA */
        #area-impressao { display: none; }
        @media print {
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            body * { visibility: hidden; }
            #area-impressao, #area-impressao * { visibility: visible; }
            #area-impressao { display: block !important; position: absolute; left: 0; top: 0; width: 100%; background: white; }
            .print-mapa { page-break-after: always; width: 100%; }
            .mes-print { margin-bottom: 4px !important; border: 1px solid #000 !important; }
            .mes-print table td { height: 20px !important; font-size: 9px !important; }

            /* Relatórios (Histórico e Faxina) */
            .relatorio-folha { padding: 0.5in; visibility: visible; }
            .relatorio-tabela { width: 100%; border-collapse: collapse; visibility: visible; }
            .relatorio-tabela th, .relatorio-tabela td { border: 1px solid black; padding: 5px; font-size: 11px; text-align: center; visibility: visible; }
            .relatorio-tabela th { background: #eee !important; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 id="form-titulo">Nova Reserva</h2>
    <input type="hidden" id="edit_id">

    <div class="campo" style="display: flex; align-items: center; gap: 8px; background: #fff5f5; padding: 5px; border-radius: 4px; border: 1px solid #feb2b2;">
        <input type="checkbox" id="cancelada" style="width: 16px;">
        <label style="margin: 0; color: #c53030;">Reserva Cancelada</label>
    </div>

    <div class="campo"><label>Apartamento *</label><select id="apto_id" onchange="verificarReserva()"></select></div>

    <div class="linha-dupla">
        <div class="col-70"><label>Hóspede Principal *</label><input type="text" id="guest_principal"></div>
        <div class="col-30"><label>Adultos</label><input type="number" id="num_adultos" value="3"></div>
    </div>

    <div class="linha-dupla">
        <div class="col-50"><label>Check-In *</label><input type="date" id="data_checkin" onchange="verificarReserva()"></div>
        <div class="col-50"><label>Check-Out *</label><input type="date" id="data_checkout" onchange="verificarReserva()"></div>
    </div>

    <div class="linha-dupla">
        <div class="col-30"><label>Noites</label><input type="text" id="noites" readonly style="background: #f7fafc;"></div>
        <div class="col-70"><label>Origem *</label>
            <select id="origem">
                <option value="Booking">Booking</option><option value="AirBnb">AirBnb</option>
                <option value="VRBO">VRBO</option><option value="D">Direto (D)</option><option value="P">Pendente (P)</option>
            </select>
        </div>
    </div>

    <div class="linha-dupla">
        <div class="col-50"><label>Invoice / ID</label><input type="text" id="invoice_id"></div>
        <div class="col-50"><label># Ayrton</label><input type="text" id="ayrton_reserva_id"></div>
    </div>

    <div class="linha-dupla">
        <div class="col-50"><label>Valor Creditado (R$)</label><input type="number" step="0.01" id="valor_creditado"></div>
        <div class="col-50"><label>Data Crédito</label><input type="date" id="data_credito"></div>
    </div>

    <div class="linha-dupla">
        <div class="col-50"><label>Comissão (R$)</label><input type="number" step="0.01" id="valor_comissao"></div>
        <div class="col-50"><label>Data Comissão</label><input type="date" id="data_comissao"></div>
    </div>

    <div class="campo"><label>Observações</label><textarea id="observacoes" rows="2"></textarea></div>

    <button id="btn-salvar" class="btn-salvar" onclick="salvarFinal()">Salvar Reserva</button>
    <div style="display: flex; gap: 5px;">
        <button id="btn-limpar" class="btn-limpar" style="flex: 1;" onclick="resetarFormulario()">Limpar</button>
        <button id="btn-excluir" class="btn-excluir" style="flex: 1;" onclick="confirmarExclusao()">Excluir</button>
    </div>

    <button class="btn-historico" onclick="abrirHistorico()">Ver Lista / Histórico</button>
    
    <button class="btn-import" onclick="document.getElementById('inputCSV').click()">📥 Importar CSV</button>
    <input type="file" id="inputCSV" accept=".csv" style="display:none" onchange="importarCSV(this)">
</div>

<div class="main-content">
    <div class="topo-controles">
        <div class="controles-esquerda">
            <button class="btn-nav btn-print" onclick="imprimirMapa4Meses()">🖨️ Imprimir Mapa</button>
            <button class="btn-nav btn-faxina" onclick="abrirModalFaxina()">🧹 Imprimir Faxina</button>
        </div>
        <div class="controles-direita">
            <button class="btn-nav" onclick="mudarMes(-1)">◀ ANTERIOR</button>
            <button class="btn-nav btn-hoje" onclick="irParaHoje()">HOJE</button>
            <button class="btn-nav" onclick="mudarMes(1)">PRÓXIMO ▶</button>
        </div>
    </div>
    <div id="area-mapas"></div>
</div>

<div id="area-impressao"></div>

<!-- MODAL FAXINA -->
<div id="modalFaxina" class="modal-overlay">
    <div class="modal-box">
        <h3>Relatório de Faxina</h3>
        <div class="campo"><label>Mês:</label><select id="sel_mes_faxina"></select></div>
        <div class="campo"><label>Ano:</label><input type="number" id="sel_ano_faxina" value="2026"></div>
        <button class="btn-salvar" onclick="gerarRelatorioFaxinaFinal()">Gerar</button>
        <button class="btn-limpar" onclick="fecharModais()">Sair</button>
    </div>
</div>

<script>
    const SB_URL = "https://eqoayyftpddombylgxpw.supabase.co";
    const SB_KEY = "sb_publishable_52ePL6AdYLm58359gM4VJg_x5bfdamZ";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    let mesBase = new Date(); mesBase.setDate(1);
    let aptosGlobais = [];
    let reservasGlobais = [];
    const diasSemanaNomes = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];

    function fmt(d) { if(!d) return ""; return d.toString().split('T')[0].split(' ')[0].trim(); }

    async function init() {
        const { data: aptos } = await supabaseClient.from('apartamentos').select('*').order('nome_apto');
        aptosGlobais = aptos || [];
        const select = document.getElementById('apto_id');
        select.innerHTML = '<option value="">Selecione...</option>';
        aptosGlobais.forEach(a => select.innerHTML += `<option value="${a.id}">${a.nome_apto}</option>`);
        
        const selMes = document.getElementById('sel_mes_faxina');
        ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'].forEach((m, i) => {
            selMes.innerHTML += `<option value="${i}">${m}</option>`;
        });
        selMes.value = new Date().getMonth();

        renderizarMapaTriplo();
    }

    async function renderizarMapaTriplo() {
        const { data: reservas } = await supabaseClient.from('reservas').select('*');
        reservasGlobais = reservas || [];
        const reservasAtivas = reservasGlobais.filter(r => !r.cancelada);
        const area = document.getElementById('area-mapas');
        area.innerHTML = "";
        for (let i = 0; i < 3; i++) {
            const dataFoco = new Date(mesBase.getFullYear(), mesBase.getMonth() + i, 1);
            area.appendChild(criarTabelaMes(dataFoco, reservasAtivas));
        }
    }

    function criarTabelaMes(dataRef, reservas) {
        const ano = dataRef.getFullYear(); const mes = dataRef.getMonth();
        const ultimoDia = new Date(ano, mes + 1, 0).getDate();
        const container = document.createElement('div'); container.className = 'mes-container';
        const titulo = document.createElement('div'); titulo.className = 'titulo-mes-tabela';
        titulo.innerText = dataRef.toLocaleString('pt-BR', { month: 'long', year: 'numeric' });
        container.appendChild(titulo);

        let html = `<table><thead><tr class="cabecalho-dias"><th class="col-apto">Dia</th>`;
        for (let d = 1; d <= ultimoDia; d++) html += `<th>${d}</th>`;
        html += `</tr><tr class="cabecalho-semana"><th class="col-apto">Apto</th>`;
        for (let d = 1; d <= ultimoDia; d++) html += `<th>${diasSemanaNomes[new Date(ano, mes, d).getDay()]}</th>`;
        html += `</tr></thead><tbody>`;

        aptosGlobais.forEach(apto => {
            html += `<tr><td class="col-apto">${apto.nome_apto}</td>`;
            for (let d = 1; d <= ultimoDia; d++) {
                const dIso = new Date(ano, mes, d).toISOString().split('T')[0];
                const saindoH = reservas.find(r => r.apto_id === apto.id && fmt(r.data_checkout) === dIso);
                const entrandoH = reservas.find(r => r.apto_id === apto.id && fmt(r.data_checkin) === dIso);

                if (saindoH && entrandoH) {
                    html += `<td class="reserva-vinho" onclick="prepararEdicao('${entrandoH.id}')"></td>`;
                } else {
                    const resA = reservas.find(r => r.apto_id === apto.id && dIso >= fmt(r.data_checkin) && dIso <= fmt(r.data_checkout));
                    if (resA && (dIso === fmt(resA.data_checkin) || d === 1 || (saindoH === undefined && dIso > fmt(resA.data_checkin)))) {
                        let ok = false;
                        const ontemIso = new Date(ano, mes, d - 1).toISOString().split('T')[0];
                        const foiT = reservas.find(r => r.apto_id === apto.id && fmt(r.data_checkout) === ontemIso && reservas.some(r2 => r2.apto_id === apto.id && fmt(r2.data_checkin) === ontemIso));
                        if (dIso === fmt(resA.data_checkin) && !saindoH) ok = true;
                        else if (foiT && dIso > ontemIso) ok = true;
                        else if (d === 1) ok = true;

                        if (ok) {
                            let dur = 0; let tempD = d;
                            while(tempD <= ultimoDia) {
                                const dL = new Date(ano, mes, tempD).toISOString().split('T')[0];
                                if (dL > fmt(resA.data_checkout)) break;
                                if (reservas.some(r => r.apto_id === apto.id && fmt(r.data_checkout) === dL && reservas.some(r2 => r2.apto_id === apto.id && fmt(r2.data_checkin) === dL)) && tempD > d) break;
                                dur++; tempD++;
                            }
                            const cod = {'Booking':'B','AirBnb':'A','VRBO':'V','D':'D','P':'P'}[resA.origem] || "R";
                            html += `<td colspan="${dur}" class="${(resA.origem === 'P') ? 'reserva-p' : 'reserva-d'}" onclick="prepararEdicao('${resA.id}')">${cod} - ${resA.guest_principal}</td>`;
                            d += (dur - 1);
                        } else html += `<td></td>`;
                    } else html += `<td></td>`;
                }
            }
            html += `</tr>`;
        });
        html += `</tbody></table>`; container.innerHTML += html; return container;
    }

    // LISTA / HISTÓRICO COM REORDENAÇÃO SOLICITADA
    function abrirHistorico() {
        const area = document.getElementById('area-impressao');
        area.innerHTML = "";
        const folha = document.createElement('div');
        folha.className = 'relatorio-folha';
        
        let html = `<h2>Histórico de Reservas</h2><table class="relatorio-tabela"><thead><tr>
            <th>Check-in</th><th>Check-out</th><th>Hóspede</th><th>Apto</th><th>Dias</th><th># Ayrton</th><th>Valor</th><th>Data Crédito</th><th>Status</th>
        </tr></thead><tbody>`;

        const ordenadas = [...reservasGlobais].sort((a,b) => new Date(a.data_checkin) - new Date(b.data_checkin));

        ordenadas.forEach(r => {
            const apto = aptosGlobais.find(a => a.id === r.apto_id)?.nome_apto || "N/A";
            const dias = r.noites || 0;
            const status = r.cancelada ? "Cancelada" : "Ativa";
            html += `<tr>
                <td>${r.data_checkin.split('-').reverse().join('/')}</td>
                <td>${r.data_checkout.split('-').reverse().join('/')}</td>
                <td>${r.guest_principal}</td>
                <td>${apto}</td>
                <td>${dias}</td>
                <td>${r.ayrton_reserva_id || ""}</td>
                <td>$ ${parseFloat(r.valor_creditado || 0).toFixed(2)}</td>
                <td>${r.data_credito ? r.data_credito.split('-').reverse().join('/') : ""}</td>
                <td style="color:${r.cancelada ? 'red' : 'green'}">${status}</td>
            </tr>`;
        });
        html += `</tbody></table>`;
        folha.innerHTML = html;
        area.appendChild(folha);
        window.print();
    }

    function abrirModalFaxina() { document.getElementById('modalFaxina').style.display = 'flex'; }
    function fecharModais() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); }

    function gerarRelatorioFaxinaFinal() {
        const mes = parseInt(document.getElementById('sel_mes_faxina').value);
        const ano = parseInt(document.getElementById('sel_ano_faxina').value);
        const area = document.getElementById('area-impressao');
        area.innerHTML = "";
        const folha = document.createElement('div');
        folha.className = 'relatorio-folha';
        let html = `<h2>Relatório de Faxina - ${mes+1}/${ano}</h2><table class="relatorio-tabela"><thead><tr><th>Item</th><th>Data</th><th>Apto</th><th>Valor</th></tr></thead><tbody>`;
        let total = 0; let item = 1;
        reservasGlobais.forEach(r => {
            const dOut = new Date(r.data_checkout + "T12:00:00");
            if(dOut.getMonth() === mes && dOut.getFullYear() === ano && !r.cancelada) {
                const apto = aptosGlobais.find(a => a.id === r.apto_id);
                const preco = apto?.preco_faxina || 0;
                html += `<tr><td>${item++}</td><td>${r.data_checkout.split('-').reverse().join('/')}</td><td>${apto?.nome_apto}</td><td>$ ${preco.toFixed(2)}</td></tr>`;
                total += preco;
            }
        });
        html += `<tr><td colspan="3"><strong>TOTAL</strong></td><td><strong>$ ${total.toFixed(2)}</strong></td></tr></tbody></table>`;
        folha.innerHTML = html; area.appendChild(folha);
        fecharModais(); window.print();
    }

    function imprimirMapa4Meses() {
        const area = document.getElementById('area-impressao');
        area.innerHTML = "";
        let dataInicio = new Date(mesBase);
        for (let i = 0; i < 8; i += 4) {
            const folha = document.createElement('div'); folha.className = 'print-mapa';
            for (let j = 0; j < 4; j++) {
                const df = new Date(dataInicio.getFullYear(), dataInicio.getMonth() + i + j, 1);
                folha.appendChild(criarTabelaMes(df, reservasGlobais.filter(r => !r.cancelada)));
            }
            area.appendChild(folha);
        }
        window.print();
    }

    async function salvarFinal() {
        const id = document.getElementById('edit_id').value;
        const r = {
            cancelada: document.getElementById('cancelada').checked,
            apto_id: document.getElementById('apto_id').value,
            guest_principal: document.getElementById('guest_principal').value,
            num_adultos: document.getElementById('num_adultos').value,
            data_checkin: document.getElementById('data_checkin').value,
            data_checkout: document.getElementById('data_checkout').value,
            noites: document.getElementById('noites').value,
            origem: document.getElementById('origem').value,
            invoice_id: document.getElementById('invoice_id').value,
            ayrton_reserva_id: document.getElementById('ayrton_reserva_id').value,
            valor_creditado: document.getElementById('valor_creditado').value || 0,
            data_credito: document.getElementById('data_credito').value,
            valor_comissao: document.getElementById('valor_comissao').value || 0,
            data_comissao: document.getElementById('data_comissao').value,
            observacoes: document.getElementById('observacoes').value
        };
        if(id) await supabaseClient.from('reservas').update(r).eq('id', id);
        else await supabaseClient.from('reservas').insert([r]);
        location.reload();
    }

    function prepararEdicao(id) {
        const r = reservasGlobais.find(res => res.id === id);
        if (!r) return;
        document.getElementById('edit_id').value = r.id;
        document.getElementById('form-titulo').innerText = "Editar Reserva";
        document.getElementById('cancelada').checked = r.cancelada;
        document.getElementById('apto_id').value = r.apto_id;
        document.getElementById('guest_principal').value = r.guest_principal;
        document.getElementById('num_adultos').value = r.num_adultos || 3;
        document.getElementById('data_checkin').value = fmt(r.data_checkin);
        document.getElementById('data_checkout').value = fmt(r.data_checkout);
        document.getElementById('noites').value = r.noites;
        document.getElementById('origem').value = r.origem;
        document.getElementById('invoice_id').value = r.invoice_id || "";
        document.getElementById('ayrton_reserva_id').value = r.ayrton_reserva_id || "";
        document.getElementById('valor_creditado').value = r.valor_creditado;
        document.getElementById('data_credito').value = r.data_credito;
        document.getElementById('valor_comissao').value = r.valor_comissao;
        document.getElementById('data_comissao').value = r.data_comissao;
        document.getElementById('observacoes').value = r.observacoes || "";
        document.getElementById('btn-excluir').style.display = "block";
    }

    function verificarReserva() {
        const cin = document.getElementById('data_checkin').value;
        const cout = document.getElementById('data_checkout').value;
        if(cin && cout) {
            const diff = Math.round((new Date(cout) - new Date(cin)) / (1000*60*60*24));
            document.getElementById('noites').value = diff > 0 ? diff : 0;
        }
    }

    async function importarCSV(input) {
        const file = input.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = async (e) => {
            const linhas = e.target.result.split(/\r?\n/).slice(1);
            for (let l of linhas) {
                const c = l.split(/[,;]/); if(c.length < 5) continue;
                const aptoId = aptosGlobais.find(a => a.nome_apto.includes(c[0].trim()))?.id;
                if(aptoId) {
                    await supabaseClient.from('reservas').insert([{
                        apto_id: aptoId, guest_principal: c[1], data_checkin: c[2], data_checkout: c[3], origem: c[4], cancelada: false
                    }]);
                }
            }
            location.reload();
        };
        reader.readAsText(file);
    }

    function resetarFormulario() { location.reload(); }
    async function excluirDeVez() { await supabaseClient.from('reservas').delete().eq('id', document.getElementById('edit_id').value); location.reload(); }
    function mudarMes(v) { mesBase.setMonth(mesBase.getMonth() + v); renderizarMapaTriplo(); }
    function irParaHoje() { mesBase = new Date(); mesBase.setDate(1); renderizarMapaTriplo(); }
    
    init();
</script>
