<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Reservas</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .campo-grupo { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input, textarea, select { width: 100%; padding: 8px; box-sizing: border-box; }
        
        /* Botões */
        .btn-azul { background-color: #007bff; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; margin-top: 10px; }
        .btn-imprimir { background-color: #28a745; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; margin-top: 10px; margin-left: 10px; }

        /* Seção Extras */
        #secao_extras { display: none; margin-top: 20px; border: 1px solid #ddd; padding: 15px; background-color: #f9f9f9; }

        /* --- ESTILOS DE IMPRESSÃO --- */
        #area_impressao { display: none; }

        @media print {
            body * { visibility: hidden; }
            #area_impressao, #area_impressao * { visibility: visible; }
            #area_impressao { display: block; position: absolute; left: 0; top: 0; width: 100%; }
            
            /* Cada folha terá 5 meses */
            .folha { 
                page-break-after: always; 
                display: flex; 
                flex-wrap: wrap; 
                gap: 10px;
                padding: 10px;
            }

            .mes-bloco {
                width: 18%; /* Aproximadamente 5 meses por linha */
                border: 1px solid #000;
                padding: 5px;
                font-size: 10px;
                min-height: 200px;
            }

            h2, .no-print { display: none !important; }
        }
    </style>
</head>
<body>

    <div class="no-print">
        <h2>Cadastro de Reserva</h2>

        <form id="formReserva">
            <div class="campo-grupo">
                <label>Nome do Cliente:</label>
                <input type="text" id="cliente_nome">
            </div>

            <!-- Campo OBS -->
            <div class="campo-grupo">
                <label>OBS:</label>
                <textarea id="obs" rows="4"></textarea>
            </div>

            <!-- Botão Azul ABAIXO da OBS -->
            <button type="button" class="btn-azul" onclick="toggleExtras()">Exibir Campos Extras</button>
            
            <!-- Botão Imprimir -->
            <button type="button" class="btn-imprimir" onclick="gerarRelatorioDinamico()">Imprimir Relatório</button>

            <!-- Seção de Campos Extras (Oculta) -->
            <div id="secao_extras">
                <div class="campo-grupo">
                    <label>Valor Creditado:</label>
                    <input type="text" id="valor_creditado">
                    
                    <label style="margin-top:10px;">Data Crédito:</label>
                    <input type="date" id="data_credito">
                </div>

                <hr>

                <div class="campo-grupo">
                    <label>Valor Comissão:</label>
                    <input type="text" id="valor_comissao">
                    
                    <label style="margin-top:10px;">Data Comissão:</label>
                    <input type="date" id="data_comissao">
                </div>

                <hr>

                <div class="campo-grupo">
                    <label>Usuário que Alterou:</label>
                    <input type="text" id="usuario_alterou" readonly>
                </div>

                <div class="campo-grupo">
                    <label>Data Alteração:</label>
                    <input type="text" id="data_alteracao" readonly>
                </div>
            </div>
        </form>
    </div>

    <!-- Área de Impressão -->
    <div id="area_impressao"></div>

    <script>
        // Simulando algumas reservas já existentes para o teste de impressão
        // Em um sistema real, esses dados viriam do seu banco de dados.
        const reservasCadastradas = [
            { data: "2024-05-15", cliente: "João" },
            { data: "2024-08-20", cliente: "Maria" },
            { data: "2025-02-10", cliente: "Última Reserva" } // Esta data dita o fim da impressão
        ];

        function toggleExtras() {
            var secao = document.getElementById("secao_extras");
            if (secao.style.display === "none" || secao.style.display === "") {
                secao.style.display = "block";
                document.getElementById("usuario_alterou").value = "Usuario_Logado";
                document.getElementById("data_alteracao").value = new Date().toLocaleString('pt-BR');
            } else {
                secao.style.display = "none";
            }
        }

        function gerarRelatorioDinamico() {
            const areaPrint = document.getElementById("area_impressao");
            areaPrint.innerHTML = "";

            const mesesNomes = ["Jan", "Fev", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Out", "Nov", "Dez"];
            
            let dataAtual = new Date();
            let mesCorrente = dataAtual.getMonth();
            let anoCorrente = dataAtual.getFullYear();

            // 1. Descobrir qual o último mês com reserva
            let dataUltima = new Date(); 
            reservasCadastradas.forEach(r => {
                let d = new Date(r.data);
                if (d > dataUltima) dataUltima = d;
            });

            // 2. Calcular quantos meses existem do atual até o último
            let totalMeses = (dataUltima.getFullYear() - anoCorrente) * 12 + (dataUltima.getMonth() - mesCorrente) + 1;
            
            // Garantir que imprima pelo menos os 5 primeiros meses se não houver reservas futuras
            if (totalMeses < 5) totalMeses = 5;

            // 3. Gerar as folhas (cada folha com 5 meses)
            let contadorMes = 0;
            while (contadorMes < totalMeses) {
                let folhaDiv = document.createElement("div");
                folhaDiv.className = "folha";

                // Adiciona até 5 meses nesta folha
                for (let i = 0; i < 5; i++) {
                    if (contadorMes < totalMeses) {
                        let dataLoop = new Date(anoCorrente, mesCorrente + contadorMes, 1);
                        let mesIdx = dataLoop.getMonth();
                        let anoIdx = dataLoop.getFullYear();

                        let mesBloco = document.createElement("div");
                        mesBloco.className = "mes-bloco";
                        mesBloco.innerHTML = `<strong>${mesesNomes[mesIdx]} / ${anoIdx}</strong><hr>`;
                        
                        // Filtrar reservas deste mês específico
                        let reservasDoMes = reservasCadastradas.filter(r => {
                            let d = new Date(r.data);
                            return d.getMonth() === mesIdx && d.getFullYear() === anoIdx;
                        });

                        if (reservasDoMes.length > 0) {
                            reservasDoMes.forEach(r => {
                                mesBloco.innerHTML += `<p>${r.data.split('-')[2]}: ${r.cliente}</p>`;
                            });
                        } else {
                            mesBloco.innerHTML += `<p style="color:gray">Sem reservas</p>`;
                        }

                        folhaDiv.appendChild(mesBloco);
                        contadorMes++;
                    }
                }
                areaPrint.appendChild(folhaDiv);
            }

            // 4. Disparar impressão
            window.print();
        }
    </script>
</body>
</html>
