<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel The Point - Gestão Completa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --cor-p: #4299e1; --cor-d: #fff700; --cor-vinho: #800020; --cor-borda: #ddd; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: #f4f7f6; overflow: hidden; }
        
        /* LOGIN */
        #tela-login { position: fixed; top:0; left:0; width:100%; height:100%; background:#2d3748; z-index:99999; display:none; justify-content:center; align-items:center; }
        .login-box { background:white; padding:30px; border-radius:8px; width:300px; text-align:center; }
        .login-box input { width:100%; padding:10px; margin:10px 0; border:1px solid #ddd; border-radius:4px; box-sizing:border-box; }
        .btn-login { width:100%; padding:10px; background:#38a169; color:white; border:none; border-radius:4px; cursor:pointer; font-weight:bold; }

        /* SIDEBAR (REESTRUTURADA LADO A LADO) */
        .sidebar { width: 330px; background: white; padding: 12px; border-right: 1px solid #ddd; overflow-y: auto; flex-shrink: 0; }
        .sidebar h2 { font-size: 0.9rem; margin-top: 0; color: #2c3e50; border-bottom: 2px solid #38a169; padding-bottom: 5px; margin-bottom: 10px; }
        .campo { margin-bottom: 8px; }
        .linha-dupla { display: flex; gap: 8px; margin-bottom: 8px; }
        .col-70 { flex: 0 0 68%; }
        .col-30 { flex: 1; }
        .col-50 { flex: 1; }
        label { display: block; font-size: 9px; font-weight: bold; margin-bottom: 2px; color: #666; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 4px; border: 1px solid #cbd5e0; border-radius: 4px; box-sizing: border-box; font-size: 11px; }

        .btn-salvar { width: 100%; padding: 10px; background: #38a169; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 13px; }
        .btn-limpar { width: 100%; padding: 7px; background: #718096; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 5px; font-size: 10px; display: block; width: 100%; }
        .btn-excluir { width: 100%; padding: 7px; background: #e53e3e; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 15px; font-size: 11px; display: none; width: 100%; }

        /* CONTEÚDO PRINCIPAL */
        .main-content { flex: 1; padding: 5px 10px; overflow-y: auto; display: flex; flex-direction: column; background: #edf2f7; }
        .topo-controles { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; position: sticky; top: 0; z-index: 100; background: #edf2f7; padding: 10px 5px; gap: 10px; }
        .controles-esquerda, .controles-direita { display: flex; gap: 8px; align-items: center; }

        /* BUSCA NO TOPO */
        .container-busca { display: flex; align-items: center; gap: 5px; background: #ebf8ff; padding: 5px; border-radius: 6px; border: 1px solid #3182ce; }
        .input-busca { padding: 6px; border: 1px solid #cbd5e0; border-radius: 4px; width: 180px; font-size: 11px; }
        .btn-busca-nav { padding: 4px 8px; cursor: pointer; background: #3182ce; color: white; border: none; border-radius: 4px; font-weight: bold; font-size: 10px; }
        .btn-limpar-busca { background: #e53e3e !important; padding: 4px 8px; color:white; border:none; border-radius:4px; cursor:pointer; font-weight:bold; }
        #cont-busca { font-size: 10px; font-weight: bold; color: #2b6cb0; min-width: 35px; text-align: center; }

        .btn-nav { padding: 8px 12px; cursor: pointer; background: white; border: 1px solid #cbd5e0; border-radius: 4px; font-weight: bold; font-size: 11px; }
        .btn-lista { background: #2d3748; color: white; border: none; }
        .btn-baixa { background: #d69e2e; color: white; border: none; font-weight: bold; }

        /* MAPA */
        .mes-container { margin-bottom: 15px; background: white; border-radius: 6px; padding: 5px; box-shadow: 0 1px 5px rgba(0,0,0,0.05); }
        .titulo-mes-tabela { font-weight: bold; color: #2d3748; margin-bottom: 3px; font-size: 12px; text-transform: uppercase; }
        table { border-collapse: collapse; width: 100%; table-layout: fixed; }
        th, td { border: 1px solid var(--cor-borda); height: 26px; text-align: center; font-size: 9px; overflow: hidden; white-space: nowrap; text-overflow: clip; }
        .col-apto { width: 130px; text-align: left; padding-left: 8px; background: #f8f9fa; font-weight: bold; }
        .cabecalho-dias { background: #2d3748; color: white; height: 18px; }
        .cabecalho-semana { background: #f1f5f9; color: #4a5568; height: 16px; font-size: 8px; font-weight: bold; }
        .reserva-p { background-color: var(--cor-p); font-weight: bold; cursor: pointer; }
        .reserva-d { background-color: var(--cor-d); font-weight: bold; cursor: pointer; }
        .reserva-vinho { background-color: var(--cor-vinho) !important; color: transparent !important; }
        
        .highlight-search { border: 3px solid red !important; animation: pulse 1.5s infinite; position: relative; z-index: 10; }
        @keyframes pulse { 0% { opacity: 1; } 50% { background-color: #ffcccb; } 100% { opacity: 1; } }

        /* MODAIS */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 9999; justify-content: center; align-items: center; }
        .modal-box { background: white; padding: 20px; border-radius: 10px; width: 95%; max-width: 1200px; max-height: 90vh; overflow-y: auto; }
        .tab-padrao { width: 100%; border-collapse: collapse; font-size: 11px; }
        .tab-padrao th { background: #2d3748; color: white; padding: 8px; position: sticky; top: 0; }
        .tab-padrao td { border: 1px solid #ddd; padding: 6px; text-align: center; }
        .tab-padrao tr:hover { background: #f0f7ff; cursor: pointer; }

        /* PAGINAÇÃO */
        .paginacao { margin-top: 15px; display: flex; gap: 5px; justify-content: center; }
        .paginacao button { padding: 5px 10px; cursor: pointer; border: 1px solid #ddd; background: white; border-radius: 4px; }
        .paginacao button.active { background: #2d3748; color: white; }

        /* IMPRESSÃO */
        #area-impressao { display: none; }
        @media print {
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            @page { size: letter landscape; margin: 0.3in; }
            body * { visibility: hidden; }
            #area-impressao, #area-impressao * { visibility: visible; }
            #area-impressao { display: block !important; position: absolute; left: 0; top: 0; width: 100%; }
            .print-landscape { page-break-after: always; width: 100%; display: block; }
            .mes-print { margin-bottom: 5px !important; border: 1px solid #000 !important; }
            .mes-print table td { height: 22px !important; font-size: 9px !important; line-height: 22px !important; }
            
            /* Faxina Retrato */
            .faxina-print-mode { @page { size: letter portrait; } }
            .faxina-folha { padding: 0.5in; }
            .sidebar, .topo-controles, .modal-overlay, #tela-login { display: none !important; }
        }
    </style>
</head>
<body>

<div id="tela-login">
    <div class="login-box">
        <h2>Acesso Painel</h2>
        <input type="text" id="login_user" placeholder="Usuário">
        <input type="password" id="login_pass" placeholder="Senha" onkeydown="if(event.key==='Enter') realizarLogin()">
        <button class="btn-login" onclick="realizarLogin()">Entrar</button>
    </div>
</div>

<div class="sidebar">
    <div id="user-info" style="font-size: 10px; color: #718096; margin-bottom: 10px; text-align: right;">Usuário: <b id="nome-logado">...</b></div>
    <h2 id="form-titulo">Nova Reserva</h2>
    <input type="hidden" id="edit_id">
    
    <div class="campo" style="display: flex; align-items: center; gap: 8px; background: #fff5f5; padding: 5px; border-radius: 4px; border: 1px solid #feb2b2; margin-bottom: 10px;">
        <input type="checkbox" id="cancelada" style="width: 18px; height: 18px;">
        <label style="margin: 0; color: #c53030; font-size: 11px; font-weight:bold;">RESERVA CANCELADA</label>
    </div>

    <div class="campo"><label>Apartamento *</label><select id="apto_id" onchange="verificarReserva()"></select></div>

    <div class="linha-dupla">
        <div class="col-70"><label>Hóspede Principal *</label><input type="text" id="guest_principal"></div>
        <div class="col-30"><label>Adultos</label><input type="number" id="num_adultos" value="3"></div>
    </div>

    <div class="linha-dupla">
        <div class="col-50"><label>Check-In *</label><input type="date" id="data_checkin" onchange="sincronizarCheckOut(); verificarReserva()"></div>
        <div class="col-50"><label>Check-Out *</label><input type="date" id="data_checkout" onchange="verificarReserva()"></div>
    </div>

    <div class="linha-dupla">
        <div class="col-30"><label>Noites</label><input type="text" id="noites" readonly style="background: #f0f0f0;"></div>
        <div class="col-70">
            <label>Origem *</label>
            <select id="origem">
                <option value="Booking">Booking</option><option value="AirBnb">AirBnb</option>
                <option value="VRBO">VRBO</option><option value="D">Direto (D)</option><option value="P">Pendente (P)</option>
            </select>
        </div>
    </div>

    <div class="linha-dupla">
        <div class="col-50"><label>Invoice / ID</label><input type="text" id="invoice_id"></div>
        <div class="col-50"><label>#Ayrton</label><input type="number" id="ayrton_reserva_id"></div>
    </div>

    <div class="linha-dupla">
        <div class="col-50"><label>Valor Creditado (R$)</label><input type="number" step="0.01" id="valor_creditado"></div>
        <div class="col-50"><label>Data Crédito</label><input type="date" id="data_credito"></div>
    </div>

    <div class="linha-dupla">
        <div class="col-50"><label>Valor Comissão (R$)</label><input type="number" step="0.01" id="valor_comissao"></div>
        <div class="col-50"><label>Data Comissão</label><input type="date" id="data_comissao"></div>
    </div>

    <div class="campo"><label>OBS:</label><textarea id="observacoes" rows="2"></textarea></div>
    
    <button id="btn-salvar" class="btn-salvar" onclick="salvarFinal()">Salvar Reserva</button>
    <button class="btn-limpar" onclick="resetarFormulario()">Novo (Limpar)</button>
    <button id="btn-excluir" class="btn-excluir" onclick="confirmarExclusao()">Excluir Permanente</button>
</div>

<div class="main-content">
    <div class="topo-controles">
        <div class="controles-esquerda">
            <button class="btn-nav btn-lista" onclick="abrirHistorico()">📋 Ver Lista/Histórico</button>
            <button class="btn-nav btn-baixa" onclick="abrirBaixaBooking()">💰 Baixa Booking</button>
            <button class="btn-nav" onclick="imprimirMapa4Meses()">🖨️ Mapa</button>
            <button class="btn-nav" onclick="abrirModalFaxina()">🧹 Faxina</button>
        </div>

        <div class="container-busca">
            <input type="text" class="input-busca" id="busca-hospede" placeholder="🔍 Localizar hóspede..." oninput="iniciarBuscaGlobal()">
            <button class="btn-limpar-busca" title="Limpar" onclick="limparBusca()">X</button>
            <button class="btn-busca-nav" onclick="navegarBusca(-1)">◀</button>
            <span id="cont-busca">0/0</span>
            <button class="btn-busca-nav" onclick="navegarBusca(1)">▶</button>
        </div>

        <div class="controles-direita">
            <button class="btn-nav" onclick="mudarMes(-1)">◀ ANTERIOR</button>
            <button class="btn-nav" onclick="irParaHoje()">HOJE</button>
            <button class="btn-nav" onclick="mudarMes(1)">PRÓXIMO ▶</button>
        </div>
    </div>
    <div id="area-mapas"></div>
</div>

<div id="area-impressao"></div>

<!-- MODAL HISTÓRICO -->
<div id="modalHistorico" class="modal-overlay">
    <div class="modal-box">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom:15px; border-bottom:2px solid #2d3748; padding-bottom:10px;">
            <div style="display:flex; gap:10px;">
                <button class="btn-nav" id="btn-f-ativas" onclick="setHistFilter('ativas')">Ativas</button>
                <button class="btn-nav" id="btn-f-canceladas" onclick="setHistFilter('canceladas')">Canceladas</button>
                <button class="btn-nav" id="btn-f-todas" onclick="setHistFilter('todas')">Todas</button>
            </div>
            <div class="container-busca"><input type="text" class="input-busca" id="busca-hist" placeholder="🔍 Pesquisar hóspede..." oninput="renderHistorico()"></div>
            <button class="btn-nav" style="background:#e53e3e; color:white;" onclick="fecharModais()">FECHAR</button>
        </div>
        <table class="tab-padrao">
            <thead><tr><th>Check-in</th><th>Check-out</th><th>Hóspede</th><th>Apto</th><th>Dias</th><th>#Ayrton</th><th>Valor</th><th>Data Crédito</th><th>Status</th></tr></thead>
            <tbody id="corpo-historico"></tbody>
        </table>
        <div id="paginacao-hist" class="paginacao"></div>
    </div>
</div>

<!-- MODAL BAIXA BOOKING -->
<div id="modalBaixaBooking" class="modal-overlay">
    <div class="modal-box">
        <div style="display:flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #d69e2e; padding-bottom:10px; margin-bottom:15px;">
            <h2 style="margin:0; color:#d69e2e;">Baixa Booking (Pendentes)</h2>
            <div class="container-busca">
                <input type="number" step="0.01" class="input-busca" id="busca-v-booking" placeholder="🔍 Valor (R$)..." oninput="renderBaixaBooking()">
                <button class="btn-limpar-busca" onclick="document.getElementById('busca-v-booking').value='';renderBaixaBooking()">X</button>
            </div>
            <button class="btn-nav" onclick="fecharModais()">Fechar</button>
        </div>
        <table class="tab-padrao">
            <thead><tr><th>Check-in</th><th>Check-out</th><th>Hóspede</th><th>Apto</th><th>#Ayrton</th><th>Valor (R$)</th><th>Data do Crédito</th><th>Ação</th></tr></thead>
            <tbody id="corpo-baixa-booking"></tbody>
        </table>
    </div>
</div>

<!-- MODAL FAXINA -->
<div id="modalFaxina" class="modal-overlay">
    <div class="modal-box" style="max-width:400px;">
        <h3>Relatório de Faxina</h3>
        <div class="campo"><label>Mês:</label><select id="sel_mes_faxina"></select></div>
        <div class="campo"><label>Ano:</label><input type="number" id="sel_ano_faxina" value="2026"></div>
        <button class="btn-salvar" onclick="gerarRelatorioFaxinaFinal()">Gerar</button>
        <button class="btn-limpar" onclick="fecharModais()">Sair</button>
    </div>
</div>

<script>
    const SB_URL = "https://eqoayyftpddombylgxpw.supabase.co";
    const SB_KEY = "sb_publishable_52ePL6AdYLm58359gM4VJg_x5bfdamZ";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    let userLogado = JSON.parse(sessionStorage.getItem('point_user'));
    let mesBase = new Date(); mesBase.setDate(1);
    let aptosGlobais = [];
    let reservasGlobais = [];
    let histFilter = 'ativas'; let histPage = 1; const histItemsPerPage = 20;
    let resultadosBusca = []; let indiceBusca = -1;
    const diasSemanaNomes = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];

    function fmt(d) { if(!d) return ""; return d.toString().split('T')[0].split(' ')[0].trim(); }
    function fecharModais() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); }

    window.onload = () => {
        const focusMonth = sessionStorage.getItem('mapFocusMonth');
        if(focusMonth) { mesBase = new Date(focusMonth + "T12:00:00"); mesBase.setDate(1); sessionStorage.removeItem('mapFocusMonth'); }
        if (!userLogado) document.getElementById('tela-login').style.display = 'flex';
        else { document.getElementById('nome-logado').innerText = userLogado.usuario; init(); }
    };

    async function realizarLogin() {
        const u = document.getElementById('login_user').value.trim();
        const s = document.getElementById('login_pass').value.trim();
        const { data } = await supabaseClient.from('usuarios').select('*').eq('usuario', u).eq('senha', s).single();
        if (data) { sessionStorage.setItem('point_user', JSON.stringify(data)); location.reload(); }
        else alert('Erro login.');
    }

    async function init() {
        const { data: aptos } = await supabaseClient.from('apartamentos').select('*').order('nome_apto');
        aptosGlobais = aptos || [];
        const select = document.getElementById('apto_id');
        select.innerHTML = '<option value="">Selecione...</option>';
        aptosGlobais.forEach(a => select.innerHTML += `<option value="${a.id}">${a.nome_apto}</option>`);
        
        const selMes = document.getElementById('sel_mes_faxina');
        ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'].forEach((m, i) => {
            selMes.innerHTML += `<option value="${i}">${m}</option>`;
        });
        selMes.value = new Date().getMonth();
        document.getElementById('sel_ano_faxina').value = new Date().getFullYear();
        renderizarMapaTriplo();
    }

    async function renderizarMapaTriplo() {
        const { data: reservas } = await supabaseClient.from('reservas').select('*');
        reservasGlobais = reservas || [];
        sugerirAyrton();
        const area = document.getElementById('area-mapas');
        area.innerHTML = "";
        const ativas = reservasGlobais.filter(r => !r.cancelada);
        for (let i = 0; i < 3; i++) {
            const df = new Date(mesBase.getFullYear(), mesBase.getMonth() + i, 1);
            area.appendChild(criarTabelaMes(df, ativas));
        }
        const lastId = sessionStorage.getItem('lastSavedId');
        if (lastId) {
            const el = document.getElementById(`cell-${lastId}`);
            if (el) { el.classList.add('highlight-search'); el.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
            sessionStorage.removeItem('lastSavedId');
        }
    }

    function criarTabelaMes(dataRef, reservas) {
        const ano = dataRef.getFullYear(); const mes = dataRef.getMonth();
        const ultimoDia = new Date(ano, mes + 1, 0).getDate();
        const container = document.createElement('div'); container.className = 'mes-container';
        const titulo = document.createElement('div'); titulo.className = 'titulo-mes-tabela';
        titulo.innerText = dataRef.toLocaleString('pt-BR', { month: 'long', year: 'numeric' }).toUpperCase();
        container.appendChild(titulo);
        let html = `<table><thead><tr class="cabecalho-dias"><th class="col-apto">Apto</th>`;
        for (let d = 1; d <= ultimoDia; d++) html += `<th>${d}</th>`;
        html += `</tr><tr class="cabecalho-semana"><th class="col-apto">Apto</th>`;
        for (let d = 1; d <= ultimoDia; d++) html += `<th>${diasSemanaNomes[new Date(ano, mes, d).getDay()]}</th>`;
        html += `</tr></thead><tbody>`;
        aptosGlobais.forEach(apto => {
            html += `<tr><td class="col-apto">${apto.nome_apto}</td>`;
            for (let d = 1; d <= ultimoDia; d++) {
                const dIso = new Date(ano, mes, d).toISOString().split('T')[0];
                const saindoH = reservas.find(r => r.apto_id === apto.id && fmt(r.data_checkout) === dIso);
                const entrandoH = reservas.find(r => r.apto_id === apto.id && fmt(r.data_checkin) === dIso);
                if (saindoH && entrandoH) {
                    html += `<td class="reserva-vinho" onclick="prepararEdicao('${entrandoH.id}')"></td>`;
                } else {
                    const resA = reservas.find(r => r.apto_id === apto.id && dIso >= fmt(r.data_checkin) && dIso <= fmt(r.data_checkout));
                    if (resA && (dIso === fmt(resA.data_checkin) || d === 1 || (saindoH === undefined && dIso > fmt(resA.data_checkin)))) {
                        let ok = false;
                        if (dIso === fmt(resA.data_checkin)) ok = true;
                        else if (d === 1) ok = true;
                        else if (saindoH === undefined && dIso > fmt(resA.data_checkin)) ok = true;
                        if (ok) {
                            let dur = 0; let tempD = d;
                            while(tempD <= ultimoDia) {
                                const dL = new Date(ano, mes, tempD).toISOString().split('T')[0];
                                if (dL > fmt(resA.data_checkout)) break;
                                if (reservas.some(r => r.apto_id === apto.id && fmt(r.data_checkout) === dL && reservas.some(r2 => r2.apto_id === apto.id && fmt(r2.data_checkin) === dL)) && tempD > d) break;
                                dur++; tempD++;
                            }
                            const cod = {'Booking':'B','AirBnb':'A','VRBO':'V','D':'D','P':'P'}[resA.origem] || "R";
                            html += `<td colspan="${dur}" id="cell-${resA.id}" class="${(resA.origem === 'P') ? 'reserva-p' : 'reserva-d'}" onclick="prepararEdicao('${resA.id}')">${cod} - ${resA.guest_principal}</td>`;
                            d += (dur - 1);
                        } else html += `<td></td>`;
                    } else html += `<td></td>`;
                }
            }
            html += `</tr>`;
        });
        html += `</tbody></table>`; container.innerHTML += html; return container;
    }

    // --- CARREGAMENTO TOTAL DE CAMPOS ---
    function prepararEdicao(id) {
        const r = reservasGlobais.find(res => res.id === id);
        if (!r) return;
        document.getElementById('edit_id').value = r.id;
        document.getElementById('form-titulo').innerText = "Editar Reserva";
        document.getElementById('cancelada').checked = r.cancelada || false;
        document.getElementById('apto_id').value = r.apto_id;
        document.getElementById('guest_principal').value = r.guest_principal;
        document.getElementById('num_adultos').value = r.num_adultos || 3;
        document.getElementById('data_checkin').value = fmt(r.data_checkin);
        document.getElementById('data_checkout').value = fmt(r.data_checkout);
        document.getElementById('noites').value = r.noites || 0;
        document.getElementById('origem').value = r.origem;
        document.getElementById('invoice_id').value = r.invoice_id || "";
        document.getElementById('ayrton_reserva_id').value = r.ayrton_reserva_id || "";
        document.getElementById('valor_creditado').value = r.valor_creditado || 0;
        document.getElementById('data_credito').value = fmt(r.data_credito);
        document.getElementById('valor_comissao').value = r.valor_comissao || 0;
        document.getElementById('data_comissao').value = fmt(r.data_comissao);
        document.getElementById('observacoes').value = r.observacoes || "";
        document.getElementById('btn-excluir').style.display = "block";
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    async function salvarFinal() {
        const id = document.getElementById('edit_id').value;
        const r = {
            cancelada: document.getElementById('cancelada').checked,
            apto_id: document.getElementById('apto_id').value,
            guest_principal: document.getElementById('guest_principal').value,
            num_adultos: document.getElementById('num_adultos').value,
            data_checkin: document.getElementById('data_checkin').value,
            data_checkout: document.getElementById('data_checkout').value,
            noites: document.getElementById('noites').value,
            origem: document.getElementById('origem').value,
            invoice_id: document.getElementById('invoice_id').value,
            ayrton_reserva_id: document.getElementById('ayrton_reserva_id').value,
            valor_creditado: document.getElementById('valor_creditado').value || 0,
            data_credito: document.getElementById('data_credito').value || null,
            valor_comissao: document.getElementById('valor_comissao').value || 0,
            data_comissao: document.getElementById('data_comissao').value || null,
            observacoes: document.getElementById('observacoes').value
        };
        sessionStorage.setItem('mapFocusMonth', r.data_checkin);
        let resp;
        if(id) resp = await supabaseClient.from('reservas').update(r).eq('id', id).select();
        else resp = await supabaseClient.from('reservas').insert([r]).select();
        if(!resp.error) { sessionStorage.setItem('lastSavedId', resp.data[0].id); location.reload(); }
    }

    function confirmarExclusao() { if(confirm("Excluir reserva permanentemente?")) excluirDeVez(); }
    async function excluirDeVez() { await supabaseClient.from('reservas').delete().eq('id', document.getElementById('edit_id').value); location.reload(); }

    function sugerirAyrton() {
        if (document.getElementById('edit_id').value) return;
        const ayrtonField = document.getElementById('ayrton_reserva_id');
        const numeros = reservasGlobais.map(r => parseInt(r.ayrton_reserva_id)).filter(n => !isNaN(n));
        ayrtonField.value = numeros.length > 0 ? Math.max(...numbers) + 1 : 1;
    }
    
    function resetarFormulario() { location.reload(); }
    function sincronizarCheckOut() { const cin = document.getElementById('data_checkin').value; if(cin) document.getElementById('data_checkout').value = cin; }
    function mudarMes(v) { mesBase.setMonth(mesBase.getMonth() + v); renderizarMapaTriplo(); }
    function irParaHoje() { mesBase = new Date(); mesBase.setDate(1); renderizarMapaTriplo(); }

    // --- IMPRESSÃO MAPA (4 MESES) ---
    function imprimirMapa4Meses() {
        const area = document.getElementById('area-impressao'); area.innerHTML = "";
        let dataInicio = new Date(mesBase);
        let dataFim = new Date();
        reservasGlobais.forEach(r => { if(new Date(r.data_checkout) > dataFim) dataFim = new Date(r.data_checkout); });
        let totalMeses = (dataFim.getFullYear() - dataInicio.getFullYear()) * 12 + (dataFim.getMonth() - dataInicio.getMonth()) + 1;
        if(totalMeses < 4) totalMeses = 4;
        for (let i = 0; i < totalMeses; i += 4) {
            const folha = document.createElement('div'); folha.className = 'print-landscape';
            for (let j = 0; j < 4; j++) {
                if (i + j < totalMeses) {
                    const df = new Date(dataInicio.getFullYear(), dataInicio.getMonth() + i + j, 1);
                    const mesB = criarTabelaMes(df, reservasGlobais.filter(r => !r.cancelada));
                    mesB.classList.add('mes-print'); folha.appendChild(mesB);
                }
            }
            area.appendChild(folha);
        }
        window.print();
    }

    // --- BAIXA BOOKING ---
    function abrirBaixaBooking() { document.getElementById('modalBaixaBooking').style.display = 'flex'; renderBaixaBooking(); }
    function renderBaixaBooking() {
        const busca = parseFloat(document.getElementById('busca-v-booking').value) || null;
        let lista = reservasGlobais.filter(r => r.origem === 'Booking' && !r.cancelada && !r.data_credito);
        if(busca) lista = lista.filter(r => parseFloat(r.valor_creditado) === busca);
        const corpo = document.getElementById('corpo-baixa-booking'); corpo.innerHTML = "";
        lista.sort((a,b) => new Date(a.data_checkin) - new Date(b.data_checkin));
        lista.forEach(r => {
            const apto = aptosGlobais.find(a => a.id === r.apto_id)?.nome_apto || "-";
            corpo.innerHTML += `<tr><td>${fmt(r.data_checkin)}</td><td>${fmt(r.data_checkout)}</td><td>${r.guest_principal}</td><td>${apto}</td><td>${r.ayrton_reserva_id || ""}</td><td>$${r.valor_creditado}</td><td><input type="date" id="b-dt-${r.id}"></td><td><button onclick="baixaRapida('${r.id}')">SALVAR</button></td></tr>`;
        });
    }
    async function baixaRapida(id) {
        const d = document.getElementById(`b-dt-${id}`).value; if(!d) return;
        await supabaseClient.from('reservas').update({ data_credito: d }).eq('id', id);
        location.reload();
    }

    // --- HISTÓRICO ---
    function setHistFilter(f) { histFilter = f; histPage = 1; renderHistorico(); }
    function abrirHistorico() { document.getElementById('modalHistorico').style.display='flex'; renderHistorico(); }
    function renderHistorico() {
        document.querySelectorAll('.filtros-hist button').forEach(b => b.classList.remove('active'));
        const termo = document.getElementById('busca-hist').value.toLowerCase();
        let filtrados = reservasGlobais.filter(r => {
            if(histFilter === 'ativas') return !r.cancelada;
            if(histFilter === 'canceladas') return r.cancelada;
            return true;
        }).filter(r => r.guest_principal.toLowerCase().includes(termo));
        filtrados.sort((a,b) => new Date(b.data_checkin) - new Date(a.data_checkin));
        const dataPag = filtrados.slice((histPage - 1) * histItemsPerPage, histPage * histItemsPerPage);
        const corpo = document.getElementById('corpo-historico'); corpo.innerHTML = "";
        dataPag.forEach(r => {
            const apto = aptosGlobais.find(a => a.id === r.apto_id)?.nome_apto || "-";
            corpo.innerHTML += `<tr onclick="prepararEdicao('${r.id}'); fecharModais();"><td>${fmt(r.data_checkin)}</td><td>${fmt(r.data_checkout)}</td><td>${r.guest_principal}</td><td>${apto}</td><td>${r.noites}</td><td>${r.ayrton_reserva_id || ""}</td><td>$${r.valor_creditado}</td><td>${fmt(r.data_credito)}</td><td>${r.cancelada ? 'Cancelada' : 'Ativa'}</td></tr>`;
        });
        const pag = document.getElementById('paginacao-hist'); pag.innerHTML = "";
        for(let i=1; i<=Math.ceil(filtrados.length/histItemsPerPage); i++) pag.innerHTML += `<button class="${i===histPage?'active':''}" onclick="histPage=${i};renderHistorico()">${i}</button>`;
    }

    // --- FAXINA ---
    function abrirModalFaxina() { document.getElementById('modalFaxina').style.display = 'flex'; }
    function gerarRelatorioFaxinaFinal() {
        const mes = parseInt(document.getElementById('sel_mes_faxina').value);
        const ano = parseInt(document.getElementById('sel_ano_faxina').value);
        const area = document.getElementById('area-impressao'); area.innerHTML = "";
        let faxinas = reservasGlobais.filter(r => {
            const d = new Date(r.data_checkout + "T12:00:00");
            return !r.cancelada && d.getMonth() === mes && d.getFullYear() === ano;
        }).sort((a,b) => new Date(a.data_checkout) - new Date(b.data_checkout));
        const folha = document.createElement('div'); folha.className = 'faxina-folha';
        let html = `<h2>Relatório de Faxinas</h2><table class="tab-padrao"><thead><tr><th>Data</th><th>Apto</th><th>Hóspede</th><th>Valor</th></tr></thead><tbody>`;
        let total = 0;
        faxinas.forEach(f => {
            const v = aptosGlobais.find(a => a.id === f.apto_id)?.preco_faxina || 0;
            html += `<tr><td>${fmt(f.data_checkout)}</td><td>${aptosGlobais.find(a=>a.id===f.apto_id).nome_apto}</td><td>${f.guest_principal}</td><td>$${v.toFixed(2)}</td></tr>`;
            total += v;
        });
        html += `<tr><td colspan="3" style="text-align:right">TOTAL:</td><td>$${total.toFixed(2)}</td></tr></tbody></table>`;
        folha.innerHTML = html; area.appendChild(folha); window.print();
    }

    // --- BUSCA GLOBAL ---
    function iniciarBuscaGlobal() {
        const busca = document.getElementById('busca-hospede').value.toLowerCase().trim();
        if(busca.length < 2) { resultadosBusca = []; indiceBusca = -1; document.getElementById('cont-busca').innerText = "0/0"; return; }
        resultadosBusca = reservasGlobais.filter(r => !r.cancelada && r.guest_principal.toLowerCase().includes(busca)).sort((a,b) => new Date(a.data_checkin) - new Date(a.data_checkin));
        if(resultadosBusca.length > 0) { indiceBusca = 0; irParaResultadoBusca(); }
    }
    function limparBusca() { document.getElementById('busca-hospede').value = ''; renderizarMapaTriplo(); }
    function navegarBusca(dir) { indiceBusca += dir; if(indiceBusca >= resultadosBusca.length) indiceBusca = 0; irParaResultadoBusca(); }
    function irParaResultadoBusca() {
        const res = resultadosBusca[indiceBusca]; document.getElementById('cont-busca').innerText = `${indiceBusca+1}/${resultadosBusca.length}`;
        const dr = new Date(res.data_checkin + "T12:00:00"); mesBase = new Date(dr.getFullYear(), dr.getMonth(), 1);
        renderizarMapaTriplo().then(() => { 
            document.querySelectorAll('.highlight-search').forEach(e=>e.classList.remove('highlight-search'));
            const el = document.getElementById(`cell-${res.id}`); if(el) el.classList.add('highlight-search');
        });
    }

    function verificarReserva() {
        const cin = document.getElementById('data_checkin').value;
        const cout = document.getElementById('data_checkout').value;
        if(cin && cout) {
            const diff = Math.round((new Date(cout + "T12:00:00") - new Date(cin + "T12:00:00")) / (1000*60*60*24));
            document.getElementById('noites').value = diff > 0 ? diff : 0;
        }
    }

    init();
</script>
